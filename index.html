    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(0,210,255,0.3); }
            50% { box-shadow: 0 0 30px rgba(0,210,255,0.8); }
        }
        @keyframes readyPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0,255,100,0.3); }
            50% { box-shadow: 0 0 30px rgba(0,255,100,0.8); }
        }
        @keyframes specialGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(168,85,247,0.4); }
            50% { box-shadow: 0 0 22px rgba(168,85,247,0.9); }
        }
        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
        .ready-glow { animation: readyPulse 1.5s ease-in-out infinite; }
        .special-section-glow { animation: specialGlow 2.5s ease-in-out infinite; }
        .roulette-container {
            position: relative;
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            margin: 20px 0;
        }
        .roulette-inner {
            display: flex;
            position: absolute;
            left: 0;
            top: 20px;
            transition: transform 6.5s cubic-bezier(0.1, 0, 0.1, 1);
            will-change: transform;
        }
        .roulette-item {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            margin: 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .roulette-item .emoji { font-size: 3.5rem; }
        .roulette-item .name {
            font-size: 11px;
            opacity: 0.8;
            text-align: center;
            margin-top: 4px;
        }
        .roulette-pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ff4757;
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 20px #ff4757;
        }
        .roulette-pointer::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #ff4757;
        }
        .roulette-pointer::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 15px solid #ff4757;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .old-price {
            text-decoration: line-through;
            text-decoration-color: #ef4444;
            text-decoration-thickness: 2px;
            color: #9ca3af;
            margin-right: 4px;
            font-size: 11px;
        }
        .new-price {
            color: #ffffff;
            font-weight: bold;
            font-size: 13px;
        }
        .fullscreen-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            overflow-y: auto;
        }
        .ice-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 4px solid rgba(0,210,255,0.6);
            position: relative;
            overflow: hidden;
            background: rgba(0, 40, 80, 0.6);
            box-shadow: 0 0 40px rgba(0,210,255,0.4), inset 0 0 60px rgba(0,0,0,0.5);
        }
        .ice-ball {
            position: absolute;
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #00d2ff, #0066ff);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,210,255,0.9), 0 0 30px rgba(0,150,255,0.5);
            z-index: 20;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.8);
            transition: left 0.025s linear, top 0.025s linear;
        }
        .player-avatar {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid white;
            overflow: hidden;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .case-cardboard {
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 50%, #8B4513 100%);
            border: 3px solid #A0522D;
        }
        .case-collector {
            background: linear-gradient(135deg, #DC143C 0%, #FF1493 50%, #8B008B 100%);
            border: 3px solid #FFD700;
        }
        .case-daily {
            background: linear-gradient(135deg, #0f766e 0%, #0891b2 50%, #4f46e5 100%);
            border: 2px solid rgba(6,182,212,0.6);
        }
        .special-header {
            background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(219,39,119,0.3));
            border: 1px solid rgba(168,85,247,0.5);
            border-radius: 16px;
            padding: 10px 16px;
            text-align: center;
            margin-bottom: 12px;

        .player-row-ready {

        }
        .player-row-waiting {
            border-color: rgba(255,200,0,0.4) !important;
            background: rgba(255,200,0,0.05) !important;
        }
        .player-row-presence {
            border-color: rgba(150,150,150,0.3) !important;
        }
        .divider-line {
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(168,85,247,0.8), rgba(250,204,21,0.8), transparent);
            margin: 20px 0 16px 0;
        }
        @keyframes regularGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(250,204,21,0.4); }
            50% { box-shadow: 0 0 22px rgba(250,204,21,0.9); }

            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 35px rgba(255,215,0,0.9), 0 0 60px rgba(255,100,0,0.6); }

            const [iceLobby, setIceLobby] = useState(null);
            const [gameStatus, setGameStatus] = useState('waiting');
            const [ballPos, setBallPos] = useState({ x: 50, y: 50 });
            const [timerRemaining, setTimerRemaining] = useState(0);
            const [myBet, setMyBet] = useState(25);
            const [myBetInput, setMyBetInput] = useState(25);
            const [hasBet, setHasBet] = useState(false);
            const [isReady, setIsReady] = useState(false);
            const [myColor, setMyColor] = useState('');
            const [presenceCount, setPresenceCount] = useState(0);
            const [bettingCount, setBettingCount] = useState(0);
            const [readyCount, setReadyCount] = useState(0);
            const [showVictoryBox, setShowVictoryBox] = useState(false);
            const [victoryStars, setVictoryStars] = useState(0);
            const [victoryPrize, setVictoryPrize] = useState(null);
            const [boxOpened, setBoxOpened] = useState(false);
            const [prizeClaimedLocal, setPrizeClaimedLocal] = useState(false);

            // в”Ђв”Ђв”Ђ tick в”Ђв”Ђв”Ђ
            useEffect(() => {
                const iv = setInterval(() => {
                    setNowTs(Date.now());
                    // Event countdown to 1.03.26 00:00:00
                    const eventDate = new Date('2026-03-01T00:00:00').getTime();
                    const now = Date.now();
                    const diff = eventDate - now;
                    if (diff > 0) {
                        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                        setEventCountdown({ days, hours, minutes, seconds });
                    } else {
                        setEventCountdown({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                    }
                }, 1000);
                return () => clearInterval(iv);
            }, []);

            const getDailyRemainMs = (last = dailyCaseLastOpenedAt) =>
                Math.max(0, DAILY_CASE_COOLDOWN_MS - (nowTs - (last || 0)));
            const isDailyAvailable = () => getDailyRemainMs() === 0;

            // в”Ђв”Ђв”Ђ INIT в”Ђв”Ђв”Ђ
            useEffect(() => {
                const initApp = async () => {
                    let userId = null;
                    let userData = { name: 'Р“РѕСЃС‚СЊ', username: null, avatar: null };

                    if (TelegramWebApp) {
                        TelegramWebApp.ready();
                        TelegramWebApp.expand();
                        const tgUser = TelegramWebApp.initDataUnsafe?.user;
                        if (tgUser) {
                            userId = tgUser.id.toString();
                            userData = {
                                name: tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : ''),
                                username: tgUser.username ? '@' + tgUser.username : null,
                                avatar: tgUser.photo_url || null
                            };
                        }
                    }
                    if (!userId) {
                        userId = localStorage.getItem('sbs_user_id') || ('guest_' + Date.now());
                        localStorage.setItem('sbs_user_id', userId);
                    } else {
                        localStorage.setItem('sbs_user_id', userId);
                    }

                    try {
                        const snap = await db.ref('users/' + userId).once('value');
                        const data = snap.val();
                        if (data) {
                            const storedCases = data.cases || {};
                            const mergedCases = { ...INITIAL_CASES };
                            for (const [key, value] of Object.entries(storedCases)) {
                                if (mergedCases[key]) mergedCases[key] = { ...mergedCases[key], ...value };
                                else mergedCases[key] = value;
                            }
                            await db.ref('users/' + userId + '/cases').set(mergedCases);
                            setUser({ id: userId, ...userData, ...data });
                            setBalance(data.balance || 0);
                            setHeroCoin(data.heroCoin || 0);
                            setEventSide(data.eventSide || '');
                            setEventHeroCasesOpened(data.eventHeroCasesOpened || 0);
                            setEventVillainCasesOpened(data.eventVillainCasesOpened || 0);
                            setEventHeroFreeOpened(data.eventHeroFreeOpened || 0);
                            setEventVillainFreeOpened(data.eventVillainFreeOpened || 0);
                            setCases(mergedCases);
                            setInventory(data.inventory || []);
                            setTasks(data.tasks || {
                                subscribe: { completed: false }, deposit: { completed: false },
                                depositMajor: { completed: false },
                                inviteThree: { completed: false, count: 0, required: 3, reward: 25 }
                            });
                            setInventorySlots(data.inventorySlots || 5);
                            setUsedPromos(data.usedPromos || []);
                            setWonPromos(data.wonPromos || []);
                            setTotalDeposits(data.totalDeposits || 0);
                            setFreeEliteSpin(data.freeEliteSpin || 0);
                            setDailyCaseLastOpenedAt(data.dailyCaseLastOpenedAt || 0);
                            db.ref('users/' + userId).update({ name: userData.name, username: userData.username || '' });
                        } else {
                            const newCases = { ...INITIAL_CASES, diamond: { ...INITIAL_CASES.diamond, freeCount: 5 } };
                            const newUser = {
                                balance: 0, cases: newCases, inventory: [],
                                tasks: { subscribe: { completed: false }, deposit: { completed: false }, depositMajor: { completed: false }, inviteThree: { completed: false, count: 0, required: 3, reward: 25 } },
                                inventorySlots: 5, usedPromos: [], wonPromos: [], heroCoin: 0, eventSide: '', eventHeroCasesOpened: 0, eventVillainCasesOpened: 0, eventHeroFreeOpened: 0, eventVillainFreeOpened: 0,
                                createdAt: Date.now(), lastActive: Date.now(),
                                totalDeposits: 0, freeEliteSpin: 0, dailyCaseLastOpenedAt: 0,
                                name: userData.name, username: userData.username || ''
                            };
                            setCases(newCases);
                            setUser({ id: userId, ...userData });
                            await db.ref('users/' + userId).set(newUser);
                        }
                    } catch (e) { console.error(e); }
                    setIsLoading(false);
                };
                initApp();
            }, []);

            // в”Ђв”Ђв”Ђ Online presence в”Ђв”Ђв”Ђ
            useEffect(() => {
                if (!user?.id) return;
                const ref = db.ref('online/' + user.id);
                ref.set({ name: user.name, timestamp: Date.now() });
                ref.onDisconnect().remove();
                db.ref('online').on('value', snap => {
                    setOnlineCount(Math.floor(Math.random() * 300) + 200 + snap.numChildren());
                });
                return () => ref.remove();
            }, [user?.id]);

            // в”Ђв”Ђв”Ђ Auto-save в”Ђв”Ђв”Ђ
            useEffect(() => {
                if (!user?.id || isLoading) return;
                const iv = setInterval(() => {
                    const dailyRemainMs = getDailyRemainMs();
                    db.ref('users/' + user.id).update({
                        balance, cases, inventory, tasks, inventorySlots,
                        usedPromos, wonPromos, heroCoin, eventSide, eventHeroCasesOpened, eventVillainCasesOpened, eventHeroFreeOpened, eventVillainFreeOpened, lastActive: Date.now(),
                        totalDeposits, freeEliteSpin, dailyCaseLastOpenedAt,
                        dailyCaseRemainMs: dailyRemainMs
                    });
                }, 5000);
                return () => clearInterval(iv);
            }, [balance, cases, inventory, tasks, inventorySlots, usedPromos, wonPromos, heroCoin, eventSide, eventHeroCasesOpened, eventVillainCasesOpened, eventHeroFreeOpened, eventVillainFreeOpened, user?.id, isLoading, totalDeposits, freeEliteSpin, dailyCaseLastOpenedAt, nowTs]);

            // в”Ђв”Ђв”Ђ Ice lobby listener в”Ђв”Ђв”Ђ
            useEffect(() => {
                if (!currentGame?.lobbyId || !user?.id) return;
                const lobbyId = currentGame.lobbyId;
                const lobbyRef = db.ref('iceLobbies/' + lobbyId);
                lobbyRef.on('value', snap => {
                    const data = snap.val();
                    if (!data) return;
                    setIceLobby(data);
                    const status = data.status || 'waiting';
                    setGameStatus(status);
                    setPresenceCount(data.presence ? Object.keys(data.presence).length : 0);
                    const players = data.players || {};
                    setBettingCount(Object.keys(players).length);
                    setReadyCount(data.readyPlayers ? Object.keys(data.readyPlayers).length : 0);
                    if (players[user.id]) {
                        setHasBet(true); setMyBet(players[user.id].bet); setMyBetInput(players[user.id].bet);
                        if (players[user.id].color) setMyColor(players[user.id].color);
                    } else if (status !== 'playing' && status !== 'countdown') {
                        setHasBet(false); setIsReady(false);
                    }
                    if (data.readyPlayers?.[user.id]) setIsReady(true);
                    else if (status === 'open') setIsReady(false);
                    if (data.ballPosition) setBallPos(data.ballPosition);
                    if (data.countdownEnd && status === 'countdown') {
                        setTimerRemaining(Math.max(0, Math.ceil((data.countdownEnd - Date.now()) / 1000)));
                    } else setTimerRemaining(0);
                    if (status === 'finished' && data.winner?.id === user.id && !data.prizeClaimed?.[user.id] && !prizeClaimedLocal) {
                        setVictoryStars(data.wonStars || 0);
                        setVictoryPrize(data.prizes?.[0] || null);
                        setShowVictoryBox(true); setBoxOpened(false);
                    }
                });
                return () => { lobbyRef.off(); if (user?.id) db.ref('iceLobbies/' + lobbyId + '/presence/' + user.id).remove(); };
            }, [currentGame?.lobbyId, user?.id]);

            useEffect(() => {
                if (gameStatus !== 'countdown') { setTimerRemaining(0); return; }
                const iv = setInterval(() => setTimerRemaining(p => p <= 1 ? (clearInterval(iv), 0) : p - 1), 1000);
                return () => clearInterval(iv);
            }, [gameStatus]);

            // в”Ђв”Ђв”Ђ Ice lobby functions в”Ђв”Ђв”Ђ
            const joinIceLobby = async (lobbyId) => {
                if (!user?.id) return;
                const lobbyRef = db.ref('iceLobbies/' + lobbyId);
                const snap = await lobbyRef.once('value');
                const data = snap.val() || {};
                const status = data.status || 'waiting';
                const color = myColor || getRandomColor();
                setMyColor(color);
                if (status === 'playing' || status === 'countdown') {
                    setCurrentGame({ type: 'ice', lobbyId, spectator: !data.players?.[user.id] });
                    const presRef = db.ref('iceLobbies/' + lobbyId + '/presence/' + user.id);
                    await presRef.set({ name: user.name, avatar: user.avatar || null, joinedAt: Date.now(), color, spectator: !data.players?.[user.id] });
                    presRef.onDisconnect().remove();
                    return;
                }
                setShowVictoryBox(false); setBoxOpened(false); setPrizeClaimedLocal(false);
                setHasBet(false); setIsReady(false);
                const presRef = db.ref('iceLobbies/' + lobbyId + '/presence/' + user.id);
                await presRef.set({ name: user.name, avatar: user.avatar || null, joinedAt: Date.now(), color });
                presRef.onDisconnect().remove();
                setCurrentGame({ type: 'ice', lobbyId, spectator: false });
                const snap2 = await db.ref('iceLobbies/' + lobbyId).once('value');
                const data2 = snap2.val() || {};
                if (Object.keys(data2.presence || {}).length >= 2 && (!data2.status || data2.status === 'waiting')) {
                    await lobbyRef.update({ status: 'open' });
                }
            };

            const leaveIceLobby = async () => {
                if (!currentGame?.lobbyId || !user?.id) { setCurrentGame(null); return; }
                const lobbyId = currentGame.lobbyId;
                const lobbyRef = db.ref('iceLobbies/' + lobbyId);
                await db.ref('iceLobbies/' + lobbyId + '/presence/' + user.id).remove();
                if (hasBet) {
                    const snap = await lobbyRef.once('value');
                    const data = snap.val() || {};
                    if ((data.status === 'open' || data.status === 'waiting') && data.players?.[user.id]) {
                        const betAmt = data.players[user.id].bet;
                        const newBal = balance + betAmt;
                        setBalance(newBal);
                        await db.ref('users/' + user.id + '/balance').set(newBal);
                        await db.ref('iceLobbies/' + lobbyId + '/players/' + user.id).remove();
                        await db.ref('iceLobbies/' + lobbyId + '/readyPlayers/' + user.id).remove();
                    }
                }
                const snap2 = await lobbyRef.once('value');
                const data2 = snap2.val() || {};
                if (Object.keys(data2.presence || {}).length < 2 && data2.status === 'open') {
                    await lobbyRef.update({ status: 'waiting', readyPlayers: {} });
                }
                setCurrentGame(null); setHasBet(false); setIsReady(false);
                setShowVictoryBox(false); setPrizeClaimedLocal(false);
            };

            const placeBet = async () => {
                if (gameStatus !== 'open') { alert('РЎС‚Р°РІРєРё СЃРµР№С‡Р°СЃ РЅРµРґРѕСЃС‚СѓРїРЅС‹!'); return; }
                if (myBetInput < 25) { alert('РњРёРЅРёРјР°Р»СЊРЅР°СЏ СЃС‚Р°РІРєР° 25в­ђпёЏ!'); return; }
                if (balance < myBetInput) { alert('РќРµРґРѕСЃС‚Р°С‚РѕС‡РЅРѕ Р·РІС‘Р·Рґ!'); return; }
                const lobbyRef = db.ref('iceLobbies/' + currentGame.lobbyId);
                const snap = await lobbyRef.once('value');
                if (snap.val()?.status !== 'open') { alert('РЎС‚Р°РІРєРё Р·Р°РєСЂС‹С‚С‹!'); return; }
                const newBal = balance - myBetInput;
                setBalance(newBal);
                await db.ref('users/' + user.id + '/balance').set(newBal);
                const color = myColor || getRandomColor();
                setMyColor(color);
                await lobbyRef.child('players/' + user.id).set({ name: user.name, avatar: user.avatar || null, bet: myBetInput, color, timestamp: Date.now() });
                setMyBet(myBetInput); setHasBet(true);
            };

            const changeBet = async () => {
                if (gameStatus !== 'open') { alert('РЎРµР№С‡Р°СЃ РЅРµР»СЊР·СЏ РјРµРЅСЏС‚СЊ СЃС‚Р°РІРєСѓ!'); return; }
                if (myBetInput < 25) { alert('РњРёРЅРёРјР°Р»СЊРЅР°СЏ СЃС‚Р°РІРєР° 25в­ђпёЏ!'); return; }
                const lobbyRef = db.ref('iceLobbies/' + currentGame.lobbyId);
                const snap = await lobbyRef.once('value');
                const data = snap.val() || {};
                if (!data.players?.[user.id]) return;
                const oldBet = data.players[user.id].bet;
                const balAfterReturn = balance + oldBet;
                if (balAfterReturn < myBetInput) { alert('РќРµРґРѕСЃС‚Р°С‚РѕС‡РЅРѕ Р·РІС‘Р·Рґ!'); return; }
                const newBal = balAfterReturn - myBetInput;
                setBalance(newBal);
                await db.ref('users/' + user.id + '/balance').set(newBal);
                await lobbyRef.child('players/' + user.id).update({ bet: myBetInput, timestamp: Date.now() });
                setMyBet(myBetInput);
                await lobbyRef.child('readyPlayers/' + user.id).remove();
                setIsReady(false);
            };

            const toggleReady = async () => {
                if (!hasBet) { alert('РЎРЅР°С‡Р°Р»Р° СЃРґРµР»Р°Р№С‚Рµ СЃС‚Р°РІРєСѓ!'); return; }
                if (gameStatus !== 'open') return;
                const lobbyRef = db.ref('iceLobbies/' + currentGame.lobbyId);
                if (isReady) { await lobbyRef.child('readyPlayers/' + user.id).remove(); setIsReady(false); return; }
                await lobbyRef.child('readyPlayers/' + user.id).set({ name: user.name, readyAt: Date.now() });
                setIsReady(true);
                const snap = await lobbyRef.once('value');
                const data = snap.val() || {};
                const players = data.players || {};
                const readyPlayers = data.readyPlayers || {};
                const bCount = Object.keys(players).length;
                const newReadySet = { ...readyPlayers, [user.id]: true };
                const rCount = Object.keys(newReadySet).length;
                if (bCount >= 2 && rCount >= bCount) {
                    const countdownEnd = Date.now() + 10000;
                    await lobbyRef.update({ status: 'countdown', countdownEnd });
                    setTimeout(() => triggerGameStart(lobbyRef, currentGame.lobbyId), 10000);
                }
            };

            useEffect(() => {
                if (gameStatus !== 'countdown' || !currentGame?.lobbyId) return;
                const presRef = db.ref('iceLobbies/' + currentGame.lobbyId + '/presence');
                presRef.on('child_added', async () => {
                    const snap = await db.ref('iceLobbies/' + currentGame.lobbyId).once('value');
                    const data = snap.val() || {};
                    if (data.status !== 'countdown') return;
                    const newPresKeys = Object.keys(data.presence || {}).filter(k => !(data.players || {})[k]);
                    if (newPresKeys.length > 0) {
                        await db.ref('iceLobbies/' + currentGame.lobbyId).update({ status: 'open', countdownEnd: null });
                    }
                });
                return () => presRef.off('child_added');
            }, [gameStatus, currentGame?.lobbyId]);

            const triggerGameStart = async (lobbyRef, lobbyId) => {
                const snap = await lobbyRef.once('value');
                const data = snap.val();
                if (!data || data.status !== 'countdown') return;
                const players = data.players || {};
                const readyPlayers = data.readyPlayers || {};
                if (Object.keys(players).length < 2 || Object.keys(readyPlayers).length < Object.keys(players).length) {
                    for (const [pid, pdata] of Object.entries(players)) {
                        await db.ref('users/' + pid + '/balance').transaction(c => (c || 0) + pdata.bet);
                    }
                    await lobbyRef.update({ status: 'open', countdownEnd: null, players: {}, readyPlayers: {} });
                    return;
                }
                await startIceGame(lobbyRef);
            };

            const startIceGame = async (lobbyRef) => {
                await lobbyRef.update({ status: 'playing', gameStartedAt: Date.now() });
                let x = 50, y = 50;
                const angle = Math.random() * Math.PI * 2;
                const initialSpeed = 8 + Math.random() * 6;
                let vx = Math.cos(angle) * initialSpeed;
                let vy = Math.sin(angle) * initialSpeed;
                const FRICTION = 0.994, RADIUS = 44, CENTER = 50;
                const iv = setInterval(async () => {
                    x += vx * 0.4; y += vy * 0.4;
                    const dx = x - CENTER, dy = y - CENTER;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist >= RADIUS) {
                        const nx = dx/dist, ny = dy/dist;
                        const dot = vx*nx + vy*ny;
                        vx -= 2*dot*nx; vy -= 2*dot*ny;
                        const pa = (Math.random()-0.5)*0.4;
                        const cos = Math.cos(pa), sin = Math.sin(pa);
                        [vx, vy] = [vx*cos - vy*sin, vx*sin + vy*cos];
                        const overlap = dist - RADIUS + 1;
                        x -= nx*overlap; y -= ny*overlap;
                    }
                    vx *= FRICTION; vy *= FRICTION;
                    await lobbyRef.child('ballPosition').set({ x, y, vx, vy });
                    if (Math.sqrt(vx*vx + vy*vy) < 0.08) { clearInterval(iv); await finishIceGame(lobbyRef, x, y); }
                }, 25);
            };

            const finishIceGame = async (lobbyRef, finalX, finalY) => {
                const snap = await lobbyRef.once('value');
                const data = snap.val();
                if (!data?.players) return;
                const players = Object.entries(data.players);
                const totalBet = players.reduce((s, [, p]) => s + p.bet, 0);
                let angle = Math.atan2(finalY - 50, finalX - 50) * 180 / Math.PI;
                if (angle < 0) angle += 360;
                const normAngle = ((angle % 360) + 360) % 360;
                let winner = null;
                const sorted = [...players].sort((a, b) => a[1].timestamp - b[1].timestamp);
                let currentAngle = 0;
                sorted.forEach(([id, p], index) => {
                    if (winner) return;
                    const sector = (p.bet / totalBet) * 360;
                    const start = currentAngle, end = currentAngle + sector;
                    if (index === sorted.length - 1) {
                        if (normAngle >= start || normAngle < (end % 360)) winner = { id, ...p };
                    } else if (normAngle >= start && normAngle < end) winner = { id, ...p };
                    currentAngle = end;
                });
                if (!winner) winner = { id: sorted[0][0], ...sorted[0][1] };
                const rand = Math.random() * 100;
                let cum = 0, wonPrize = ICE_ARENA_PRIZES[0];
                for (const prize of ICE_ARENA_PRIZES) { cum += prize.chance; if (rand <= cum) { wonPrize = prize; break; } }
                const winAmount = Math.floor(totalBet * 0.65);
                await lobbyRef.update({ status: 'finished', winner, prizes: [wonPrize], wonStars: winAmount, finalBall: { x: finalX, y: finalY } });
                if (winner.id === user.id) {
                    let newBal = balance + winAmount;
                    if (wonPrize.id === 'fire') { newBal += Math.floor(totalBet * 0.4); alert('рџ”Ґ Р’С‹ СЂР°СЃС‚РѕРїРёР»Рё Р»С‘Рґ! +40% РѕС‚ Р±Р°РЅРєР°!'); }
                    setBalance(newBal);
                    await db.ref('users/' + user.id + '/balance').set(newBal);
                }
            };

            const openVictoryBox = async () => {
                if (boxOpened || !victoryPrize) return;
                setBoxOpened(true); setPrizeClaimedLocal(true);
                await db.ref('iceLobbies/' + currentGame.lobbyId + '/prizeClaimed/' + user.id).set(true);
                const prize = victoryPrize;
                if (prize.type === 'stars') { const nb = balance + prize.value; setBalance(nb); await db.ref('users/' + user.id + '/balance').set(nb); }
                else if (prize.type === 'item') await addToInventory(prize);
                else if (prize.type === 'case_free') { const nc = { ...cases, [prize.caseType]: { ...cases[prize.caseType], freeCount: (cases[prize.caseType].freeCount || 0) + 1 } }; setCases(nc); }
                else if (prize.type === 'promo') alert('РџРѕР»СѓС‡РµРЅ РїСЂРѕРјРѕРєРѕРґ: ' + prize.code);
            };

            const exitLobbyAfterGame = async () => {
                if (!currentGame?.lobbyId) { setCurrentGame(null); return; }
                await db.ref('iceLobbies/' + currentGame.lobbyId).set(DEFAULT_LOBBY);
                setCurrentGame(null); setHasBet(false); setIsReady(false);
                setShowVictoryBox(false); setBoxOpened(false); setPrizeClaimedLocal(false);
                setMyColor(''); setMyBet(25); setMyBetInput(25);
            };

            const exitLobbyNonWinner = async () => {
                if (!currentGame?.lobbyId) { setCurrentGame(null); return; }
                await db.ref('iceLobbies/' + currentGame.lobbyId + '/presence/' + user.id).remove();
                setCurrentGame(null); setHasBet(false); setIsReady(false);
                setMyColor(''); setMyBet(25); setMyBetInput(25);
            };

            const renderIceField = () => {
                if (!iceLobby?.players) return null;
                const players = Object.entries(iceLobby.players);
                if (!players.length) return null;
                const totalBet = players.reduce((s, [, p]) => s + p.bet, 0);
                if (!totalBet) return null;
                const sorted = [...players].sort((a, b) => a[1].timestamp - b[1].timestamp);
                let currentAngle = 0;
                return sorted.map(([id, player]) => {
                    const pct = (player.bet / totalBet) * 100;
                    const sectorDeg = (player.bet / totalBet) * 360;
                    const midAngle = currentAngle + sectorDeg / 2;
                    const startAngle = currentAngle;
                    currentAngle += sectorDeg;
                    const avatarX = 50 + 28 * Math.cos((midAngle - 90) * Math.PI / 180);
                    const avatarY = 50 + 28 * Math.sin((midAngle - 90) * Math.PI / 180);
                    const labelX = 50 + 18 * Math.cos((midAngle - 90) * Math.PI / 180);
                    const labelY = 50 + 18 * Math.sin((midAngle - 90) * Math.PI / 180);
                    return (
                        <React.Fragment key={id}>
                            <div className="absolute inset-0" style={{ background: `conic-gradient(from ${startAngle}deg at 50% 50%, ${player.color}bb ${sectorDeg}deg, transparent ${sectorDeg}deg)`, clipPath: 'circle(50% at 50% 50%)', borderRadius: '50%' }} />
                            <div className="absolute pointer-events-none font-bold text-white" style={{ left: `${labelX}%`, top: `${labelY}%`, transform: 'translate(-50%,-50%)', fontSize: '11px', textShadow: '0 0 6px black' }}>{Math.round(pct)}%</div>

                                                <button key={i} onClick={() => joinIceLobby(i)} className="bg-cyan-700 hover:bg-cyan-600 py-2 rounded-lg text-sm font-bold transition">#{i}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass rounded-xl p-5 opacity-50 text-center">
                                        <h3 className="text-lg font-bold">Р’ СЂР°Р·СЂР°Р±РѕС‚РєРµ... рџ‘І</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* в•ђв•ђ TASKS SCREEN в•ђв•ђ */}
                        {currentScreen === 'tasks' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 text-center">рџ“‹ Р—Р°РґР°РЅРёСЏ</h2>
                                <div className="space-y-3">
                                    {[
                                        { id: 'subscribe', title: 'РџРѕРґРїРёС€РёСЃСЊ РЅР° РєР°РЅР°Р»', reward: '1 РєРµР№СЃ В«Р­Р»РёС‚Р°В» + 1 РїСЂРѕРєСЂСѓС‚ рџЋ–', btn: 'РџРѕРґРїРёСЃР°С‚СЊСЃСЏ' },
                                        { id: 'inviteThree', title: 'РџСЂРёРіР»Р°СЃРёС‚СЊ 3 РґСЂСѓР·РµР№', reward: '25 в­ђпёЏ', btn: 'РџСЂРёРіР»Р°СЃРёС‚СЊ', progress: true },
                                        { id: 'deposit', title: 'РџРѕРїРѕР»РЅРёС‚СЊ РЅР° 100 в­ђпёЏ', reward: '1 Р·РѕР»РѕС‚РѕР№ РєРµР№СЃ рџ‘‘', btn: 'РџРѕРїРѕР»РЅРёС‚СЊ' },
                                        { id: 'depositMajor', title: 'РџРѕРїРѕР»РЅРёС‚СЊ РЅР° 350 в­ђпёЏ', reward: 'РљРµР№СЃ В«РљРѕР»Р»РµРєС†РёРѕРЅРµСЂВ» + 1 РїСЂРѕРєСЂСѓС‚', btn: 'РџРѕРїРѕР»РЅРёС‚СЊ' }
                                    ].map(task => (
                                        <div key={task.id} className={`glass rounded-xl p-4 ${tasks[task.id]?.completed ? 'bg-green-500/20' : ''}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <h3 className="font-bold text-sm">{task.title}</h3>
                                                    <p className="text-xs opacity-75">РќР°РіСЂР°РґР°: {task.reward}</p>
                                                    {task.progress && !tasks[task.id]?.completed && (
                                                        <p className="text-xs text-cyan-400 mt-0.5">РџСЂРѕРіСЂРµСЃСЃ: {tasks[task.id]?.count || 0}/3</p>
                                                    )}
                                                </div>
                                                {tasks[task.id]?.completed && <span className="text-green-400 text-xl">вњ…</span>}
                                            </div>
                                            <button onClick={() => completeTask(task.id)} disabled={tasks[task.id]?.completed} className={`w-full py-2 rounded-lg text-sm ${tasks[task.id]?.completed ? 'bg-green-600' : 'bg-blue-600 hover:bg-blue-500'} transition`}>
                                                {tasks[task.id]?.completed ? 'Р’С‹РїРѕР»РЅРµРЅРѕ' : task.btn}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* в•ђв•ђ PROFILE SCREEN в•ђв•ђ */}
                        {currentScreen === 'profile' && (
                            <div>
                                <div className="glass rounded-xl p-3 mb-4 flex justify-between items-center">
                                    <span className="text-gray-400 text-sm">рџџў РћРЅР»Р°Р№РЅ:</span>
                                    <span className="font-bold text-green-400 text-sm">{onlineCount} РёРіСЂРѕРєРѕРІ</span>
                                </div>
                                <h2 className="text-2xl font-bold mb-4 text-center">рџ‘¤ РњРѕР№ РџСЂРѕС„РёР»СЊ</h2>
                                <div className="glass rounded-xl p-5 text-center mb-4">
                                    <div className="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-3xl mb-3 overflow-hidden border-2 border-white/20">
                                        {user?.avatar ? <img src={user.avatar} alt="" className="w-full h-full object-cover" /> : user?.name?.charAt(0).toUpperCase()}
                                    </div>
                                    <h3 className="text-lg font-bold">{user?.name}</h3>
                                    {user?.username && <p className="text-gray-400 text-sm">{user.username}</p>}
                                </div>
                                <div className="flex gap-2 mb-4">
                                    <button onClick={() => setShowTopUp(true)} className="flex-1 bg-gradient-to-r from-yellow-400 to-orange-500 text-gray-900 font-bold py-3 rounded-xl shadow-lg transition text-sm">рџ’Ћ РџРѕРїРѕР»РЅРёС‚СЊ</button>
                                </div>
                                <div className="mb-4">
                                    <button onClick={() => setShowWithdrawModal(true)} disabled={!tasks.depositMajor?.completed} className="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg transition text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                                        {tasks.depositMajor?.completed ? 'рџЏ† Р’С‹РІРµСЃС‚Рё РїСЂРёР·С‹ рџЏ†' : 'рџ”’ Р’С‹РІРµСЃС‚Рё РїСЂРёР·С‹ (РЅСѓР¶РЅРѕ 350в­ђпёЏ)'}
                                    </button>
                                </div>
                                <div className="glass rounded-xl p-4 mb-4">
                                    <h3 className="font-bold mb-2 text-sm">рџЋЃ РџСЂРѕРјРѕРєРѕРґ</h3>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="РџР РћРњРћРљРћР”" value={promoCode} onChange={e => setPromoCode(e.target.value)} className="flex-1 bg-gray-700/50 border border-gray-600 rounded-lg px-3 py-2 text-center uppercase text-sm" />
                                        <button onClick={checkPromo} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg font-bold transition text-sm">OK</button>
                                    </div>
                                    {promoError && <p className="text-red-400 text-xs mt-2 text-center">{promoError}</p>}
                                    {promoSuccess && <p className="text-green-400 text-xs mt-2 text-center">{promoSuccess}</p>}
                                </div>
                                <div className="glass rounded-xl p-4">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="font-bold text-sm">рџЋ’ РРЅРІРµРЅС‚Р°СЂСЊ</h3>
                                        <span className="text-xs text-gray-400">{inventory.length}/{inventorySlots}</span>
                                    </div>
                                    <div className="grid grid-cols-5 gap-2 mb-3">
                                        {[...Array(inventorySlots)].map((_, i) => (
                                            <div key={i} className="aspect-square bg-gray-700/50 rounded-lg flex items-center justify-center text-2xl hover:bg-gray-600/50 transition cursor-pointer">
                                                {inventory[i] ? (
                                                    <span onClick={() => sellItem(inventory[i])} className="hover:scale-110 transition">{inventory[i].emoji}</span>
                                                ) : (
                                                    <span className="text-gray-600 text-xs">в—‹</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={unlockSlot} disabled={balance < 50} className="w-full bg-gray-700 hover:bg-gray-600 disabled:opacity-50 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2 transition">
                                        рџ”“ Р Р°Р·Р±Р»РѕРєРёСЂРѕРІР°С‚СЊ СЃР»РѕС‚ (50в­ђпёЏ)
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* в”Ђв”Ђ CASE OPEN MODAL в”Ђв”Ђ */}
                    {selectedCase && (
                        <div className="fullscreen-modal flex items-start justify-center p-4 pt-8">
                            <div className="w-full max-w-lg" ref={rouletteContainerRef}>
                                <div className="flex justify-between items-center mb-5">
                                    <h3 className="text-2xl font-bold">{selectedCase.emoji} {selectedCase.name}</h3>
                                    <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="text-3xl hover:text-red-400 transition">Г—</button>
                                </div>
                                <div className="roulette-container mb-5">
                                    <div className="roulette-pointer" />
                                    <div
                                        key={rouletteKey}
                                        className="roulette-inner"
                                        style={{
                                            transform: `translateX(${rouletteOffset}px)`,
                                            transition: isSpinning ? 'transform 6.5s cubic-bezier(0.1, 0, 0.1, 1)' : 'none'
                                        }}
                                    >
                                        {fakeItems.length > 0 ? (
                                            fakeItems.map((item, i) => (
                                                <div key={i} className="roulette-item">
                                                    <div className="emoji">{item.emoji}</div>
                                                    <div className="name">{item.name}</div>
                                                </div>
                                            ))
                                        ) : (
                                            [...Array(80)].map((_, i) => <div key={i} className="roulette-item"><div className="emoji">вќ“</div></div>)
                                        )}
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-4 mb-5 max-h-40 overflow-y-auto">
                                    <p className="font-bold mb-2 text-center text-sm">Р’РѕР·РјРѕР¶РЅС‹Рµ РЅР°РіСЂР°РґС‹:</p>
                                    <div className="space-y-1">
                                        {CASE_REWARDS[selectedCase.id]?.map((r, i) => (
                                            <div key={i} className="flex justify-between py-1 border-b border-white/10 last:border-0 text-xs">
                                                <span>{r.emoji} {r.name}</span>
                                                <span className="text-yellow-400 font-bold">{r.displayChance}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {spinResult ? (
                                    <div className="text-center">
                                        <p className="text-xl font-bold mb-2">рџЋ‰ Р’С‹РїР°Р»Рѕ: {spinResult.name}!</p>
                                        {spinResult.type === 'collectible' && <p className="text-yellow-400 text-xs mb-4">в­ђпёЏ РљРѕР»Р»РµРєС†РёРѕРЅРЅС‹Р№ РїСЂРµРґРјРµС‚!</p>}
                                        <button onClick={() => { setSpinResult(null); setFakeItems([]); setRouletteOffset(0); }} className="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold mb-2 transition">Р—Р°Р±СЂР°С‚СЊ Рё РѕС‚РєСЂС‹С‚СЊ РµС‰С‘</button>
                                        <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="w-full bg-gray-600 hover:bg-gray-500 py-2.5 rounded-xl font-bold transition text-sm">Рљ РєРµР№СЃР°Рј</button>
                                    </div>
                                ) : (
                                    <>
                                        {selectedCase.id === 'daily' && getDailyRemainMs() > 0 && (
                                            <div className="text-center mb-4 p-3 bg-cyan-900/30 rounded-xl border border-cyan-500/30">
                                                <p className="text-cyan-300 font-bold text-sm mb-1">вЏі РљРµР№СЃ РЅРµРґРѕСЃС‚СѓРїРµРЅ</p>
                                                <p className="text-gray-400 text-xs">Р”Рѕ СЃР»РµРґСѓСЋС‰РµРіРѕ РїРѕР»СѓС‡РµРЅРёСЏ: <span className="text-white font-bold">{formatTimer(getDailyRemainMs())}</span></p>
                                                <p className="text-gray-500 text-xs mt-2">Р’С‹ РјРѕР¶РµС‚Рµ РїРѕСЃРјРѕС‚СЂРµС‚СЊ РЅР°РіСЂР°РґС‹, РЅРѕ РЅРµ РјРѕР¶РµС‚Рµ РєСЂСѓС‚РёС‚СЊ</p>
                                            </div>
                                        )}
                                        <button
                                            onClick={() => openCase(selectedCase.id, selectedCase.id === 'daily' && getDailyRemainMs() > 0)}
                                            disabled={isSpinning || (selectedCase.id !== 'daily' && getCasePrice(selectedCase.id) > 0 && balance < getCasePrice(selectedCase.id))}
                                            className="w-full bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 py-4 rounded-xl font-bold text-lg disabled:opacity-50 shadow-lg transition"
                                        >
                                            {isSpinning
                                                ? 'рџЊЂ РљСЂСѓС‚РёРј...'
                                                : selectedCase.id === 'daily' && getDailyRemainMs() > 0
                                                    ? 'рџ‘Ѓ РўРѕР»СЊРєРѕ РїСЂРѕСЃРјРѕС‚СЂ РЅР°РіСЂР°Рґ'
                                                    : `РћС‚РєСЂС‹С‚СЊ${getCasePrice(selectedCase.id) > 0 ? ` Р·Р° ${getCasePrice(selectedCase.id)}в­ђпёЏ` : ' Р‘РµСЃРїР»Р°С‚РЅРѕ'}`}
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {/* в”Ђв”Ђ TOP UP MODAL в”Ђв”Ђ */}
                    {showTopUp && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold">рџ’і РџРѕРїРѕР»РЅРµРЅРёРµ</h3>
                                    <button onClick={() => setShowTopUp(false)} className="text-2xl hover:text-red-400 transition">Г—</button>
                                </div>
                                <p className="text-xs text-gray-400 text-center mb-3">в­ђпёЏ Telegram Stars</p>
                                <div className="space-y-2 mb-4">
                                    {STARS_PACKAGES.map(pkg => (
                                        <button key={pkg.stars} onClick={() => buyStars(pkg)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 transition border border-white/10">
                                            <span className="font-bold text-yellow-400 text-sm">+{pkg.stars} в­ђпёЏ</span>
                                            <span className="text-gray-300 text-xs">РљСѓРїРёС‚СЊ</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="border-t border-gray-600 pt-4">
                                    <p className="text-xs text-gray-400 text-center mb-3">рџ’Ћ TON</p>
                                    {TON_RATES.map(rate => (
                                        <button key={rate.stars} onClick={() => topUpBalance(rate.stars, rate.ton)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 transition border border-white/10 mb-2">
                                            <span className="font-bold text-sm">+{rate.stars}в­ђпёЏ</span>
                                            <span className="text-yellow-400 font-bold text-sm">{rate.ton} TON</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* в”Ђв”Ђ BOTTOM NAV в”Ђв”Ђ */}
                    <nav className="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-2">
                        <div className="max-w-md mx-auto flex justify-around">
                            {[
                                { id: 'tasks', emoji: 'рџ“‹', label: 'Р—Р°РґР°РЅРёСЏ' },
                                { id: 'cases', emoji: 'рџЋЃ', label: 'РљРµР№СЃС‹' },
                                { id: 'events', emoji: 'рџЏ›пёЏ', label: 'РРІРµРЅС‚С‹' },
                                { id: 'games', emoji: 'рџЋ®', label: 'РРіСЂС‹' },
                                { id: 'profile', emoji: 'рџ‘¤', label: 'РџСЂРѕС„РёР»СЊ' }
                            ].map(s => (
                                <button key={s.id} onClick={() => setCurrentScreen(s.id)} className={`flex flex-col items-center p-2 rounded-lg transition ${currentScreen === s.id ? 'text-blue-400 scale-110' : 'text-gray-400 hover:text-white'}`}>
                                    <span className="text-2xl">{s.emoji}</span>
                                    <span className="text-xs font-bold">{s.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
