    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; overscroll-behavior: none; }
        .olympus-font { font-family: 'Cinzel', serif; font-weight: 700; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 10px rgba(0,210,255,0.3); } 50% { box-shadow: 0 0 30px rgba(0,210,255,0.8); } }
        @keyframes goldGlow { 0%, 100% { text-shadow: 0 0 5px #facc15, 0 0 10px #facc15; } 50% { text-shadow: 0 0 20px #facc15, 0 0 30px #eab308; } }
        @keyframes purpleGlow { 0%, 100% { text-shadow: 0 0 5px #a855f7, 0 0 10px #a855f7; } 50% { text-shadow: 0 0 20px #a855f7, 0 0 30px #9333ea; } }
        @keyframes greenGlow { 0%, 100% { box-shadow: 0 0 5px #22c55e, 0 0 10px #22c55e; } 50% { box-shadow: 0 0 15px #22c55e, 0 0 25px #16a34a; } }
        @keyframes yellowGlow { 0%, 100% { text-shadow: 0 0 5px #fbbf24, 0 0 10px #fbbf24; } 50% { text-shadow: 0 0 20px #fbbf24, 0 0 30px #f59e0b; } }
        @keyframes neonPulse { 0%, 100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fbbf24, 0 0 30px #fbbf24, 0 0 40px #f59e0b; } 50% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fbbf24, 0 0 40px #fbbf24, 0 0 60px #f59e0b; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .neon-text { animation: neonPulse 2s infinite; }
        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
        .special-header { animation: purpleGlow 3s infinite; }
        .ordinary-header { animation: goldGlow 3s infinite; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .line-through { text-decoration: line-through; opacity: 0.6; color: #ef4444; text-decoration-color: #ef4444; text-decoration-thickness: 2px; }
        .fullscreen-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; overflow-y: auto; }
        .daily-timer { color: #4ade80; font-family: monospace; font-weight: bold; font-size: 14px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 6px; border: 1px solid #22c55e; animation: greenGlow 2s infinite; display: inline-block; }
        .cases-timer { color: #fbbf24; font-family: monospace; text-shadow: 0 0 5px #fbbf24; animation: yellowGlow 2s infinite; }
        .case-cardboard { background: linear-gradient(135deg, #8B4513 0%, #D2691E 50%, #8B4513 100%); border: 3px solid #A0522D; }
        .case-collector { background: linear-gradient(135deg, #DC143C 0%, #FF1493 50%, #8B008B 100%); border: 3px solid #FFD700; }
        .events-tab-active { background: linear-gradient(135deg, rgba(251,191,36,0.3), rgba(245,158,11,0.2)); border: 2px solid rgba(251,191,36,0.6); box-shadow: 0 0 20px rgba(251,191,36,0.4); }
        .roulette-container { position: relative; width: 100%; height: 140px; overflow: hidden; background: rgba(0,0,0,0.4); border-radius: 16px; border: 2px solid rgba(255,255,255,0.1); margin: 16px 0; }
        .roulette-inner { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6.5s cubic-bezier(0.1, 0, 0.1, 1); will-change: transform; }
        .roulette-item { width: 110px; height: 110px; flex-shrink: 0; margin: 0 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .roulette-item .emoji { font-size: 3rem; }
        .roulette-item .name { font-size: 10px; opacity: 0.8; text-align: center; margin-top: 2px; }
        .roulette-pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #ff4757; z-index: 20; transform: translateX(-50%); box-shadow: 0 0 20px #ff4757; }
        .roulette-pointer::before { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 15px solid #ff4757; }
        .roulette-pointer::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 15px solid #ff4757; }
        .round-box { width: 28px; height: 28px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; margin: 0 2px; transition: all 0.3s; }
        .round-box.completed { background: linear-gradient(135deg, #22c55e, #16a34a); border-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .round-box.current { background: linear-gradient(135deg, #fbbf24, #f59e0b); border-color: #fbbf24; box-shadow: 0 0 10px #fbbf24; animation: pulse 1s infinite; }
        .mobile-btn { min-height: 48px; display: flex; align-items: center; justify-content: center; }
        .progress-step { transition: all 0.3s; }
        .progress-step.done { background: linear-gradient(135deg, #22c55e, #16a34a) !important; border-color: #22c55e !important; box-shadow: 0 0 12px rgba(34,197,94,0.5); }
        .progress-step.active { border-color: #fbbf24 !important; box-shadow: 0 0 12px rgba(251,191,36,0.5); animation: pulse 1.5s infinite; }
        .case-flowers { background: linear-gradient(135deg, #ec4899 0%, #db2777 50%, #be185d 100%); border: 3px solid #fbcfe8; box-shadow: 0 0 15px #f472b6; }
        .hades-door { 
            width: 100%; 
            aspect-ratio: 1; 
            background-image: url('door.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 2px solid #7c2d12;
        }
        .hades-door:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,69,0,0.4); border-color: #fbbf24; }
        .hades-door:active { transform: scale(0.95); }
        .marquee-container { overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

                                    enterHadesGame(nt);

            const topUpBalance = async (stars, ton) => {

            const checkDepositTasks = async (nd, singleAmount) => {

            const adminGiveReward = async (uid, r) => {

                    if (uid === user.id) setCases(p => ({ ...p, [r.caseType]: { ...p[r.caseType], freeCount: cur + r.count } }));

                    if (uid === user.id) setCases(p => ({ ...p, daily: { ...p.daily, freeCount: 1, lastOpened: 0 } }));

            const getCasePrice = (ct) => {
                const c = cases[ct];

                if (c.id === 'daily' && c.freeCount > 0) return 0;
                if (c.freeCount > 0) return 0;
                if (c.id === 'flowers' && isFlowersUnlocked) return c.discountPrice;
                if (c.discountPrice && c.discountPrice !== c.price) return c.discountPrice;

            const handleSelectCase = (caseData) => {

            const openCase = async (caseType) => {
                const cData = cases[caseType];
                if (cData.id === 'daily' && cData.freeCount === 0) { alert('Ежедневный кейс не готов!'); return; }
                if (cData.id === 'flowers' && !isFlowersUnlocked) { alert('Кейс еще недоступен!'); return; }

                const price = getCasePrice(caseType);
                const isFree = cData.freeCount > 0;
                if (!isFree && balance < price) { alert('Недостаточно звезд!'); return; }
                let nb = balance;
                if (cData.id === 'daily' && isFree) {
                    const now = Date.now();
                    setCases(p => ({ ...p, daily: { ...p.daily, freeCount: 0, lastOpened: now } }));

                } else if (isFree) {
                    const nf = cData.freeCount - 1;
                    setCases(p => ({ ...p, [caseType]: { ...p[caseType], freeCount: nf } }));
                    await db.ref(`users/${user.id}/cases/${caseType}/freeCount`).set(nf);
                } else {
                    nb -= price; setBalance(nb);
                    await db.ref(`users/${user.id}/balance`).set(nb);
                }
                if (caseType === 'cardboard') {
                    const newCount = (tasks.cardboard7?.count || 0) + 1;
                    let nt = { ...tasks, cardboard7: { ...tasks.cardboard7, count: newCount } };
                    if (newCount >= 7 && !tasks.cardboard7?.completed) {
                        nt.cardboard7 = { completed: true, count: newCount };
                        const nc2 = { ...cases, diamond: { ...cases.diamond, freeCount: (cases.diamond.freeCount || 0) + 1 } };
                        setCases(nc2);
                        await db.ref(`users/${user.id}/cases/diamond/freeCount`).set((cases.diamond.freeCount || 0) + 1);
                    }
                    setTasks(nt);
                    await db.ref(`users/${user.id}/tasks`).set(nt);
                }
                setIsSpinning(false); setSpinResult(null); setFakeItems([]); setRouletteOffset(0); setRouletteKey(k => k + 1);
                const items = CASE_REWARDS[caseType];
                let won = items[0], r = Math.random() * 100, cum = 0;
                for (let i of items) { cum += i.realChance; if (r <= cum) { won = i; break; } }
                const tape = [];
                for (let i = 0; i < 80; i++) tape.push(i === 70 ? won : items[Math.floor(Math.random() * items.length)]);
                setIsSpinning(true);
                setTimeout(() => {
                    setFakeItems(tape);
                    setTimeout(() => {
                        const cw = rouletteContainerRef.current ? rouletteContainerRef.current.offsetWidth : window.innerWidth;
                        setRouletteOffset(-(70 * 122 + 55 - cw / 2));
                    }, 50);
                }, 50);

                    setSpinResult(won); setIsSpinning(false);
                    if (won.type === 'stars') {
                        const fb = nb + won.value; setBalance(fb);
                        await db.ref(`users/${user.id}/balance`).set(fb);
                    } else {
                        await addToInventory(won);
                    }
                }, 6600);
            };

            const addToInventory = async (item) => {
                if (inventory.length >= inventorySlots) { alert('Инвентарь полон!'); return; }
                const ni = [...inventory, { ...item, uniqueId: Date.now(), collected: Date.now() }];
                setInventory(ni);
                await db.ref(`users/${user.id}/inventory`).set(ni);
            };

            const sellItem = async (item) => {
                if (item.type === 'flower_item') { setSelectedFlowerItem(item); setShowFlowerItemModal(true); return; }

                if (item.type === 'collectible') { setSelectedCollectible(item); setShowCollectibleModal(true); return; }
                if (item.type === 'olympus_item') {

                        const nb = balance + item.sellPrice;
                        const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);
                        setBalance(nb); setInventory(ni);
                        await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni });
                    }
                    return;
                }
                if (item.sellPrice && confirm(`Продать ${item.name} за ${item.sellPrice}⭐️?`)) {
                    const nb = balance + item.sellPrice;
                    const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);
                    setBalance(nb); setInventory(ni);
                    await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni });
                }
            };
            
            const handleFlowerAction = async (action) => {
                const item = selectedFlowerItem;
                setShowFlowerItemModal(false); setSelectedFlowerItem(null);
                
                if (action === 'keep') return;
                
                const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);

                let nc = { ...cases };
                
                if (action === 'sell_sunflower_case') {
                    nc.star = { ...nc.star, freeCount: (nc.star.freeCount || 0) + 1 };
                } else if (action === 'sell_15') nb += 15;
                else if (action === 'sell_30') nb += 30;
                else if (action === 'sell_35') nb += 35;
                else if (action === 'sell_40') nb += 40;
                else if (action === 'sell_80') nb += 80;
                else if (action === 'sell_100') nb += 100;
                else if (action === 'sell_125') nb += 125;
                else if (action === 'sell_diamond_case') {
                    nc.diamond = { ...nc.diamond, freeCount: (nc.diamond.freeCount || 0) + 1 };
                } else if (action === 'exchange_gold_rose') {
                    nc.star = { ...nc.star, freeCount: (nc.star.freeCount || 0) + 14 };
                }
                
                setBalance(nb); setInventory(ni); setCases(nc);
                await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni, cases: nc });
            };

            const enterHadesGame = (currentTickets = fateTickets) => {
                if (currentTickets >= 1) {
                    const nt = currentTickets - 1;
                    setFateTickets(nt);
                    db.ref(`users/${user.id}/fateTickets`).set(nt);
                    setHadesGameState('intro');
                }
            };

            const startHadesLevel = () => {
                setHadesGameState('game');
                setHadesTimer(30);
                setHadesDoorOpened(false);
                setHadesReward(0);

            const openHadesDoor = async () => {

                let cum = 0;
                let won = 0;
                for (let item of HADES_REWARDS) {
                    cum += item.chance;
                    if (r <= cum) { won = item.val; break; }
                }
                setHadesReward(won);
                const nb = balance + won;
                setBalance(nb);
                await db.ref(`users/${user.id}/balance`).set(nb);
                setTimeout(() => {
                    setHadesGameState('result');
                }, 1500);
            };
            
            const plantFlower = async () => {
                 const now = Date.now();
                 setFlowerBankTimer(now);
                 await db.ref(`users/${user.id}/flowerBankTimer`).set(now);
            };
            
            const harvestFlower = async () => {
                 const items = FLOWER_BANK_REWARDS;
                 let won = items[0], r = Math.random() * 100, cum = 0;
                 for (let i of items) { cum += i.chance; if (r <= cum) { won = i; break; } }
                 
                 await addToInventory(won);
                 setFlowerBankTimer(0);
                 await db.ref(`users/${user.id}/flowerBankTimer`).set(0);
                 alert(`Вы вырастили: ${won.name}!`);
            };

                                     <button onClick={() => setCurrentGame(null)} className="w-full bg-gray-600 py-2 rounded-xl text-sm">Назад</button>
                                 </div>
                                 <div className="absolute inset-0 bg-black/60"></div>
                             </div>
                         )
                    }
                }
                
                return (
                    <div className="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center overflow-hidden relative" style={{ backgroundImage: "url('evil.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>

                             <div className="w-full max-w-lg p-4 flex flex-col h-full relative z-10">

                                             {PRO_FAKE_REWARDS.join(' • ')} • {PRO_FAKE_REWARDS.join(' • ')}
                                         </span>
                                     </div>
                                 </div>
                                 
                                 <div className="flex-1 grid grid-cols-4 gap-3 place-content-center pb-4 px-2">
                                     {[...Array(8)].map((_, i) => (
                                         <div key={i} onClick={openHadesDoor} className={`hades-door ${hadesDoorOpened ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                                         </div>
                                     ))}
                                 </div>
                                 
                                 <div className="glass rounded-xl p-4 mt-4 bg-black/60 border border-yellow-500/20">

                                         <div className="text-center"><div className="text-2xl mb-1">⭐️</div><div className="text-xl font-bold text-yellow-400">100</div></div>
                                         <div className="text-center"><div className="text-2xl mb-1">⭐️</div><div className="text-xl font-bold text-yellow-400">150</div></div>
                                     </div>

                         {hadesGameState === 'result' && (

                                         <div className="text-6xl mb-4">💀</div>

                                         <p className="text-sm text-gray-300 mb-4">Двери закрылись...</p>
                                     </>
                                 )}
                                 <button onClick={() => { setHadesGameState('menu'); setCurrentGame(null); }} className="w-full bg-gray-700 py-3 rounded-xl font-bold mobile-btn">Покинуть игру</button>
                             </div>
                         )}
                         <div className="absolute inset-0 bg-black/40 pointer-events-none"></div>
                    </div>
                );
            };

            const renderFlowerBank = () => {
                const now = Date.now();
                const timeLeft = flowerBankTimer > 0 ? (flowerBankTimer + 6 * 60 * 60 * 1000) - now : 0;
                const canHarvest = flowerBankTimer > 0 && timeLeft <= 0;
                const isGrowing = flowerBankTimer > 0 && timeLeft > 0;
                
                const growHours = Math.floor(timeLeft / (1000*60*60));
                const growMinutes = Math.floor((timeLeft % (1000*60*60)) / (1000*60));
                
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col" style={{ backgroundImage: "url('roza.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                         {!isFlowersUnlocked && (
                             <div className="flex-1 flex items-center justify-center p-4 glass m-4 rounded-xl relative z-10 text-center">
                                 <div>
                                     <div className="text-6xl mb-4">🔒</div>

                                             {flowerBankCountdown.days}д {flowerBankCountdown.hours}ч {flowerBankCountdown.м}м

                                     <button onClick={() => setCurrentGame(null)} className="w-full bg-gray-700/80 py-3 rounded-xl text-sm font-bold">Закрыть</button>

                             </div>
                         )}
                         
                         {isFlowersUnlocked && (
                             <div className="p-4 glass m-4 rounded-xl relative z-10 flex flex-col items-center text-center flex-1">
                                 <h2 className="text-2xl font-bold text-pink-400 mb-2 olympus-font">💐 Банк цветов 💐</h2>
                                 <p className="text-pink-200 text-sm mb-4">Открой вклад в банке цветов!</p>

                                 {isGrowing && (
                                     <div className="text-xl font-mono font-bold text-yellow-300 mb-4">

                                 {canHarvest && (

                                 {!isGrowing && !canHarvest && (

                                 <button onClick={() => setCurrentGame(null)} className="w-full bg-gray-700/80 py-2 rounded-xl text-sm font-bold">Назад</button>
                             </div>

            };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center"><div className="text-2xl animate-pulse">⏳ Загрузка...</div></div>;

            if (currentGame?.type === 'hades') return renderHades();
            if (currentGame?.type === 'flowerBank') return renderFlowerBank();

            if (currentGame?.type === 'gerakl') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-red-900 via-orange-900 to-red-800 pb-4" style={{ backgroundImage: "url('gerakl.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                        <div className="max-w-lg mx-auto p-3">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-xl font-bold">🪬 13 Подвиг Геракла 🌊</h1>
                                <button onClick={() => { setGeraklGameActive(false); setCurrentGame(null); }} className="bg-red-600/40 hover:bg-red-600 border border-red-500/50 px-3 py-1.5 rounded-xl font-bold text-sm">✕ Выйти</button>
                            </div>
                            {geraklResult ? (
                                <div className="glass rounded-xl p-4 mb-3 text-center border border-yellow-500/30">
                                    {geraklResult.type === 'ice' ? (
                                        <div><div className="text-5xl mb-2">🧊</div><div className="font-bold text-red-400 text-xl mb-2">ЛЁД!</div><button onClick={() => { setGeraklGameActive(false); setGeraklResult(null); setCurrentGame(null); }} className="w-full bg-gray-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">Выйти</button></div>
                                    ) : (
                                        <div><div className="text-5xl mb-2">🎉</div><div className="font-bold text-green-400 text-xl mb-2">Вы забрали {geraklResult.win}⭐️!</div>
                                            {geraklBoxPrize && !geraklBoxOpened && <div className="text-7xl mb-3 cursor-pointer" onClick={() => setGeraklBoxOpened(true)}>📦</div>}
                                            {geraklBoxPrize && geraklBoxOpened && <div className="bg-gray-800/60 rounded-xl p-3 mb-3"><p className="text-3xl">{geraklBoxPrize.emoji}</p><p className="text-white font-bold mt-1">{geraklBoxPrize.name}</p></div>}
                                            <button onClick={() => { setGeraklGameActive(false); setGeraklResult(null); setCurrentGame(null); }} className="w-full bg-green-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">Выйти</button>
                                        </div>
                                    )}
                                </div>
                            ) : geraklGameActive ? (
                                <div className="glass rounded-xl p-4 mb-3 text-center border border-yellow-500/30">
                                    <div className="text-5xl font-bold text-yellow-400 mb-2">{geraklTimer}</div>
                                    <div className="text-2xl font-bold text-yellow-400 mb-4">Выигрыш: {geraklCurrentWin}⭐️</div>
                                    <div className="flex gap-2 mb-4">
                                        <button onClick={() => {
                                            if (Math.random() < 0.2 + (geraklRound*0.03)) { setGeraklResult({ type: 'ice', round: geraklRound }); setGeraklGameActive(false); }
                                            else {
                                                const nr = geraklRound + 1; setGeraklRound(nr); setGeraklCurrentWin(Math.floor(geraklBetAmount * [1.1,1.4,1.9,2.3,2.6,3.8,4.5,5.5,6.0,10.0][nr])); setGeraklTimer(25);
                                            }
                                        }} className="flex-1 bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn">🔥 Пламя</button>
                                        <button onClick={() => {
                                             const nb = balance + geraklCurrentWin; setBalance(nb); db.ref(`users/${user.id}/balance`).set(nb);
                                             setGeraklResult({ type: 'cashout', win: geraklCurrentWin }); setGeraklGameActive(false);
                                             if(geraklRound >= 10) { setGeraklBoxPrize({emoji:'🧸', name:'Мишка'}); }
                                        }} className="flex-1 bg-gradient-to-r from-cyan-600 to-blue-600 py-3 rounded-xl font-bold text-sm mobile-btn">🧊 Забрать</button>
                                    </div>
                                    <div className="flex justify-center flex-wrap">{[...Array(10)].map((_, i) => <div key={i} className={`round-box ${i < geraklRound ? 'completed' : i === geraklRound ? 'current' : ''}`}>{i + 1}</div>)}</div>
                                </div>
                            ) : (
                                <div className="glass rounded-xl p-4 text-center border border-yellow-500/30">
                                    <div className="text-3xl mb-2 animate-bounce">🪬</div>
                                    <div className="font-bold text-yellow-300 text-lg mb-3">Соверши 13 подвиг!</div>
                                    <div className="flex gap-2 mb-3">
                                        <input type="number" min="25" value={geraklBetInput} onChange={e => setGeraklBetInput(Math.max(25, Number(e.target.value)))} className="flex-1 bg-gray-800 border border-yellow-600 rounded-lg p-2.5 text-center text-lg text-white" />
                                        <button onClick={() => setGeraklBetInput(p => p + 25)} className="bg-yellow-700 px-3 rounded-lg font-bold text-sm">+25</button>
                                    </div>
                                    <button onClick={() => { 
                                        if(balance < geraklBetInput) return;
                                        setBalance(b => b - geraklBetInput); db.ref(`users/${user.id}/balance`).set(balance - geraklBetInput);
                                        setGeraklBetAmount(geraklBetInput); setGeraklGameActive(true); setGeraklRound(0); setGeraklCurrentWin(geraklBetInput); setGeraklTimer(25); setGeraklResult(null);
                                    }} disabled={balance < geraklBetInput} className="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-2.5 rounded-xl font-bold disabled:opacity-50 text-sm mobile-btn">Начать ({geraklBetInput}⭐️)</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (isAdmin) {
                const filteredUsers = allUsers.filter(u => !adminUserSearch || (u.name && u.name.toLowerCase().includes(adminUserSearch.toLowerCase())) || (u.id && u.id.includes(adminUserSearch)));
                return (
                    <div className="min-h-screen bg-gray-900 p-4">
                        <div className="max-w-lg mx-auto">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-xl font-bold">🔐 Админ</h1>
                                <button onClick={() => setIsAdmin(false)} className="text-gray-400">Выйти</button>
                            </div>
                            <div className="flex gap-2 mb-4 overflow-x-auto">
                                {['stats', 'users', 'sebe'].map(tab => <button key={tab} onClick={() => setAdminScreen(tab)} className={`px-3 py-2 rounded-lg text-sm ${adminScreen === tab ? 'bg-indigo-600' : 'bg-gray-700'}`}>{tab === 'sebe' ? '👤 Себе' : tab}</button>)}
                            </div>
                            {adminScreen === 'stats' && (
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-gray-800 p-3 rounded-lg"><div className="text-gray-400 text-xs">Игроков</div><div className="text-2xl font-bold">{allUsers.length}</div></div>
                                    <div className="bg-gray-800 p-3 rounded-lg"><div className="text-gray-400 text-xs">Общий баланс</div><div className="text-xl font-bold">{allUsers.reduce((s, u) => s + (u.balance || 0), 0).toFixed(0)}⭐️</div></div>
                                </div>
                            )}
                            {adminScreen === 'users' && (
                                <div className="space-y-2">
                                    <input type="text" placeholder="Поиск" value={adminUserSearch} onChange={e => setAdminUserSearch(e.target.value)} className="w-full p-2 bg-gray-800 rounded" />
                                    {filteredUsers.map(u => (
                                        <div key={u.id} className="bg-gray-800 p-3 rounded flex justify-between items-center">
                                            <div><div className="font-bold">{u.name}</div><div className="text-xs text-gray-400">{u.id} | {u.balance}⭐️</div></div>
                                            <button onClick={() => setSelectedUser(u)} className="bg-blue-600 px-2 py-1 rounded text-xs">Edit</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {selectedUser && (
                                <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                                    <div className="glass p-4 rounded w-full max-w-sm">
                                        <h3 className="font-bold mb-2">{selectedUser.name}</h3>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => adminGiveReward(selectedUser.id, {type:'stars', amount:100})} className="bg-green-600 p-2 rounded">+100⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, {type:'unlock_collector'})} className="bg-pink-600 p-2 rounded">Unlock Coll.</button>
                                        </div>
                                        <button onClick={() => setSelectedUser(null)} className="w-full bg-gray-600 mt-2 p-2 rounded">Close</button>
                                    </div>
                                </div>
                            )}
                            {adminScreen === 'sebe' && (
                                <div>
                                    <h3 className="text-lg font-bold mb-4 text-center">👤 Выдача себе</h3>
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <button onClick={() => adminGiveReward(user.id, {type:'stars', amount:1000})} className="bg-green-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-green-500 transition">+1000⭐️</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'stars', amount:5000})} className="bg-green-500 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-green-400 transition">+5000⭐️</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'case', caseType: 'star', count: 10})} className="bg-blue-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-blue-500 transition">+10 Звездных</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'case', caseType: 'collector', count: 3})} className="bg-pink-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-pink-500 transition">+3 Коллектора</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'unlock_collector'})} className="bg-purple-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-purple-500 transition">Разблокировать</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'reset_daily'})} className="bg-cyan-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-cyan-500 transition">Сброс Daily</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'tickets', count: 10})} className="bg-yellow-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-yellow-500 transition">+10 билетов🎟</button>
                                        <button onClick={() => adminGiveReward(user.id, {type:'flowers_free', count: 5})} className="bg-rose-600 p-4 rounded-xl font-bold text-sm mobile-btn hover:bg-rose-500 transition">+5 Цветов🌺</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24 relative">
                    {showFlowerItemModal && selectedFlowerItem && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full text-center border-2 border-pink-400">
                                <div className="text-6xl mb-3">{selectedFlowerItem.emoji}</div>
                                <h3 className="text-xl font-bold mb-3">{selectedFlowerItem.name}</h3>
                                
                                {selectedFlowerItem.flowerType === 'sunflower' && (
                                    <div className="space-y-2">
                                        <button onClick={() => handleFlowerAction('sell_sunflower_case')} className="w-full bg-purple-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать за 1 кейс «Звездный»</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'red' && (
                                    <div className="space-y-2">
                                        <p className="mb-2 text-sm">Оставьте красныша🌺 или продайте его за 15⭐️!</p>
                                        <button onClick={() => handleFlowerAction('sell_15')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (15⭐️)</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'tulip' && (
                                    <div className="space-y-2">
                                        <p className="mb-2 text-sm">Оставьте тюльпанчик🌷 или продайте его за 30⭐️!</p>
                                        <button onClick={() => handleFlowerAction('sell_30')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (30⭐️)</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'sakura' && (
                                    <div className="space-y-2">
                                        <p className="mb-2 text-sm">Оставьте Сакуру🌸 или продайте её за 80⭐️!</p>
                                        <button onClick={() => handleFlowerAction('sell_80')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (80⭐️)</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'bouquet' && (
                                    <div className="space-y-2">
                                        <p className="mb-2 text-sm">Оставьте букетик или продайте его за 100⭐️!</p>
                                        <button onClick={() => handleFlowerAction('sell_100')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (100⭐️)</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'red_rose' && (
                                    <div className="space-y-2">
                                        <p className="mb-2 text-sm">Оставьте красную розу или продайте её за 125⭐️!</p>
                                        <button onClick={() => handleFlowerAction('sell_125')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (125⭐️)</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'gold_rose' && (
                                    <div className="space-y-2">
                                        <p className="mb-2 text-sm">Оставьте Золотую розу или обменяйте на 14 кейсов «Звездный⭐️»!</p>
                                        <button onClick={() => handleFlowerAction('exchange_gold_rose')} className="w-full bg-purple-600 py-3 rounded-xl font-bold text-sm mobile-btn">Обменять</button>
                                        <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                    </div>
                                )}
                                {selectedFlowerItem.flowerType === 'water_lily' && (
                                     <div className="space-y-2">
                                         <button onClick={() => handleFlowerAction('sell_diamond_case')} className="w-full bg-blue-500 py-3 rounded-xl font-bold text-sm mobile-btn">Продать за 1 кейс «Алмаз»</button>
                                         <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                     </div>
                                )}
                                {selectedFlowerItem.flowerType === 'white_rose' && (
                                     <div className="space-y-2">
                                         <p className="mb-2 text-sm">Оставьте Белую Розу в покое 💮 или продайте её за 40⭐️!</p>
                                         <button onClick={() => handleFlowerAction('sell_40')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (40⭐️)</button>
                                         <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                     </div>
                                )}
                                {selectedFlowerItem.flowerType === 'carbonara' && (
                                     <div className="space-y-2">
                                         <p className="mb-2 text-sm">Что? Карбонара?! Продайте её за 35⭐️ или оставьте!</p>
                                         <button onClick={() => handleFlowerAction('sell_35')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">Продать (35⭐️)</button>
                                         <button onClick={() => handleFlowerAction('keep')} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn">Оставить</button>
                                     </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showWithdrawModal && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full text-center">
                                <h2 className="text-xl font-bold mb-4">📊 Вывод призов</h2>
                                {tasks.depositMajor?.completed
                                    ? <p className="text-sm mb-4 font-bold text-green-400">Обратитесь к администрации проекта!</p>
                                    : <p className="text-sm mb-4 text-red-400">Выполни задание: пополни на 350, чтобы выводить звезды в особом курсе, установленном администрацией!</p>
                                }
                                <button onClick={() => setShowWithdrawModal(false)} className="w-full bg-gray-600 py-2 rounded-xl text-sm">Закрыть</button>
                            </div>
                        </div>
                    )}
                    
                    <header className="p-3 flex justify-between items-center glass sticky top-0 z-40 bg-indigo-900/80 backdrop-blur-md">
                        <h1 onClick={handleTitleClick} className="text-lg font-bold cursor-pointer select-none hover:text-cyan-300 transition">Step By Step Game</h1>
                        <button onClick={() => setShowTopUp(true)} className="bg-gradient-to-r from-yellow-400 to-orange-500 px-3 py-2 rounded-full font-bold text-gray-900 shadow-lg text-sm">{balance.toFixed(2)} ⭐️</button>
                    </header>

                    <main className="p-3 max-w-md mx-auto">
                        {currentScreen === 'cases' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 text-center">🎰 Кейсы</h2>
                                {Object.values(cases).filter(c => c.freeCount > 0 && c.id !== 'daily').map(c => (
                                    <div key={c.id + '_free'} className="bg-green-500/20 border border-green-500 rounded-lg p-2 mb-2 text-center text-sm animate-pulse">🎁 Бесплатных кейсов {c.name}: {c.freeCount}</div>
                                ))}

                                <div className="mb-5">
                                    <h3 className="text-lg font-bold text-center mb-3 text-purple-300 special-header">🔮 Особые 🔮</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.values(cases).filter(c => c.type === 'special').map(c => {
                                            const isDaily = c.id === 'daily';
                                            const isFlowers = c.id === 'flowers';
                                            
                                            if (c.id === 'collector' && c.locked) {
                                                return (
                                                    <div key={c.id} className="rounded-xl p-3 relative case-collector opacity-80 overflow-hidden">
                                                        <div className="absolute inset-0 bg-black/50 z-20 flex items-center justify-center"><span className="text-4xl">🔒</span></div>
                                                        <div className="w-14 h-14 mx-auto rounded-lg bg-white/20 flex items-center justify-center text-2xl mb-2">{c.emoji}</div>
                                                        <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                        <button disabled className="w-full py-2 rounded-lg font-bold text-xs bg-gray-800/80 cursor-not-allowed mobile-btn">Недоступно</button>
                                                    </div>
                                                );
                                            }
                                            
                                            if (isFlowers && !isFlowersUnlocked) {
                                                return (
                                                    <div key={c.id} className="rounded-xl p-3 relative case-flowers overflow-hidden">
                                                        <div className="absolute inset-0 bg-black/60 z-20 flex flex-col items-center justify-center">
                                                            <span className="text-2xl mb-1">🔒</span>
                                                            <span className="text-xs text-center font-bold px-2">До 08.03.26</span>
                                                        </div>
                                                        <div className="w-14 h-14 mx-auto rounded-lg bg-pink-500/20 flex items-center justify-center text-2xl mb-2">{c.emoji}</div>
                                                        <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                        <p className="text-center text-xs opacity-75 mb-2">{c.price}⭐️</p>
                                                    </div>
                                                )
                                            }

                                            return (
                                                <div key={c.id} className={`glass rounded-xl p-3 relative overflow-hidden hover:scale-105 transition ${c.id === 'collector' ? 'case-collector' : ''} ${c.id === 'flowers' ? 'case-flowers' : ''}`}>
                                                    <div className={`w-14 h-14 mx-auto rounded-lg ${c.id === 'collector' || c.id === 'flowers' ? 'bg-white/20' : `bg-gradient-to-br ${c.color}`} flex items-center justify-center text-2xl mb-2`}>{c.emoji}</div>
                                                    <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                    <p className="text-center text-xs opacity-75 mb-2">
                                                        {isDaily ? (c.freeCount > 0 ? <span className="text-green-400 font-bold">Бесплатно!</span> : <span className="daily-timer">{dailyCaseTimeLeft}</span>) : 
                                                         (isFlowers ? <span><span className="line-through">{c.price}⭐️</span> {c.discountPrice}⭐️</span> : c.price + '⭐️')}
                                                    </p>
                                                    <button onClick={() => handleSelectCase(c)} disabled={c.locked && !isFlowersUnlocked} className="w-full py-2 rounded-lg font-bold text-xs bg-gradient-to-r from-indigo-500 to-purple-500 transition mobile-btn">
                                                        {c.locked ? '🔒' : (isDaily && c.freeCount===0 ? '👁 Смотреть' : 'Открыть')}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="mb-5">
                                    <h3 className="text-lg font-bold text-center mb-3 text-yellow-300 ordinary-header">🎁 Обычные 🎁</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.values(cases).filter(c => !c.type && !c.locked).map(c => (
                                            <div key={c.id} className={`glass rounded-xl p-3 relative overflow-hidden hover:scale-105 transition ${c.id === 'cardboard' ? 'case-cardboard' : ''}`}>
                                                {c.isNew && <span className="absolute -top-1 -right-1 bg-red-500 text-xs px-1.5 py-0.5 rounded-full animate-pulse">New!</span>}
                                                <div className={`w-14 h-14 mx-auto rounded-lg ${c.id === 'cardboard' ? 'bg-white/20' : `bg-gradient-to-br ${c.color}`} flex items-center justify-center text-2xl mb-2`}>{c.emoji}</div>
                                                <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                <p className="text-center text-xs opacity-75 mb-2">
                                                    {c.freeCount > 0 ? <span className="text-green-400 font-bold">Бесплатно!</span> :
                                                        (c.discountPrice && c.discountPrice !== c.price ? <span><span className="line-through">{c.price}⭐️</span> {c.discountPrice}⭐️</span> : c.price + '⭐️')}
                                                </p>
                                                <button onClick={() => handleSelectCase(c)} className="w-full py-2 rounded-lg font-bold text-xs bg-gradient-to-r from-indigo-500 to-purple-500 transition mobile-btn">Открыть</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentScreen === 'games' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold mb-4 text-center">🎮 Игры</h2>
                                
                                <div className="glass rounded-xl p-4 border border-red-500/50 relative overflow-hidden group cursor-pointer" onClick={() => setCurrentGame({ type: 'hades' })} style={{ backgroundImage: "url('evil.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                    <div className="absolute inset-0 bg-black/60 group-hover:bg-black/40 transition"></div>
                                    <div className="relative z-10 text-center">
                                         <h3 className="text-xl font-bold mb-1 text-red-400">Подземелье Аида🔥</h3>
                                         <p className="text-gray-200 text-xs mb-3">Испытай судьбу за билет 🎟</p>
                                         <div className="bg-red-600 w-full py-2 rounded-xl font-bold text-sm">Войти</div>
                                    </div>
                                </div>

                                <div className="glass rounded-xl p-4 border border-yellow-500/30" style={{ backgroundImage: "url('gerakl.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                                    <h3 className="text-xl font-bold mb-1 text-center text-yellow-300">🪬 13 Подвиг Геракла 🌊</h3>
                                    <p className="text-yellow-400 text-center text-xs mb-3">Пройди 10 раундов и получи сундук 📦</p>
                                    <button onClick={() => setCurrentGame({ type: 'gerakl' })} className="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn">Войти</button>
                                </div>
                                
                                {!isFlowersUnlocked ? (
                                    <div className="glass rounded-xl p-4 border border-gray-500/30 relative overflow-hidden" style={{ backgroundImage: "url('roza.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                         <div className="absolute inset-0 bg-black/70"></div>
                                         <div className="relative z-10 text-center">
                                             <div className="inline-block bg-red-600 text-white text-xs px-2 py-1 rounded-full mb-2">Временное событие!</div>
                                             <div className="text-6xl mb-2">🔒</div>
                                             <h3 className="text-xl font-bold mb-1 text-pink-300 olympus-font">💐 Банк цветов 💐</h3>
                                             <p className="text-gray-300 text-xs mb-3">Открой вклад в банке цветов!</p>
                                             <div className="bg-black/50 rounded-lg p-3 mb-3">
                                                 <p className="text-sm text-gray-400 mb-1">До открытия:</p>
                                                 <p className="text-xl font-mono font-bold text-pink-300">
                                                     {flowerBankCountdown.days}д {flowerBankCountdown.hours}ч {flowerBankCountdown.minutes}м
                                                 </p>
                                             </div>
                                             <button disabled className="w-full bg-gray-600 py-2 rounded-xl font-bold text-sm mobile-btn opacity-50 cursor-not-allowed">Закрыто</button>
                                         </div>
                                    </div>
                                ) : (
                                    <div className="glass rounded-xl p-4 border border-pink-500/50 relative overflow-hidden cursor-pointer" onClick={() => setCurrentGame({ type: 'flowerBank' })} style={{ backgroundImage: "url('roza.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                         <div className="absolute inset-0 bg-black/50"></div>
                                         <div className="relative z-10 text-center">
                                             <div className="inline-block bg-red-600 text-white text-xs px-2 py-1 rounded-full mb-2">Временное событие!</div>
                                             <h3 className="text-xl font-bold mb-1 text-pink-300">💐 Банк цветов 💐</h3>
                                             <p className="text-gray-200 text-xs mb-3">Открой вклад в банке цветов!</p>
                                             <div className="bg-pink-600 w-full py-2 rounded-xl font-bold text-sm">Открыть</div>
                                         </div>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {currentScreen === 'events' && (
                             <div>
                                 {eventSubScreen === 'main' && (
                                     <div className="min-h-[70vh] rounded-xl p-4 relative" style={{ backgroundImage: "url('event.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                        <div className="absolute inset-0 bg-black/50 rounded-xl"></div>
                                        <div className="relative z-10">
                                            <h2 className="text-3xl font-bold text-center olympus-font neon-text mb-6" style={{ color: '#fbbf24' }}>⚡ ОЛИМП ⚡</h2>
                                            <div className="flex flex-col gap-4 max-w-xs mx-auto">
                                                <button onClick={() => { loadOlympusTop(); setEventSubScreen('heroes'); }} className="w-full py-4 rounded-xl font-bold text-lg olympus-font mobile-btn" style={{ background: 'linear-gradient(135deg, rgba(251,191,36,0.4), rgba(245,158,11,0.3))', border: '2px solid #fbbf24' }}>🏆 Герои Олимпа</button>
                                                <button onClick={() => setEventSubScreen('treasure')} className="w-full py-4 rounded-xl font-bold text-lg olympus-font mobile-btn" style={{ background: 'linear-gradient(135deg, rgba(139,92,246,0.4), rgba(109,40,217,0.3))', border: '2px solid #a78bfa' }}>⚡ Сокровище Олимпа</button>
                                                <button onClick={() => setEventSubScreen('gefest')} className="w-full py-4 rounded-xl font-bold text-lg olympus-font mobile-btn" style={{ background: 'linear-gradient(135deg, rgba(239,68,68,0.4), rgba(185,28,28,0.3))', border: '2px solid #f87171' }}>🏵️ Лавка Гефеста</button>
                                            </div>
                                        </div>
                                     </div>
                                 )}
                             </div>
                        )}
                        
                        {currentScreen === 'tasks' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 text-center">📋 Задания</h2>
                                <div className="space-y-3">
                                    {[
                                        { id: 'subscribe', title: 'Подпишись на канал', reward: '1 кейс «Элита» 🎖', task: tasks.subscribe },
                                        { id: 'cardboard7', title: 'Прокрути кейс «Картон📦» 7 раз', reward: '1 кейс «Алмаз💎»', task: tasks.cardboard7, progress: `${tasks.cardboard7?.count || 0}/7` },
                                        { id: 'deposit50', title: 'Пополни баланс на 50⭐️', reward: '50⭐️', task: tasks.deposit50 },
                                        { id: 'depositMajor', title: 'Пополни на 350⭐️', reward: 'Кейс «Коллекционер» + прокрут', task: tasks.depositMajor },
                                    ].map(t => (
                                        <div key={t.id} className={`glass rounded-xl p-3 ${t.task?.completed ? 'bg-green-500/20' : ''}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <h3 className="font-bold text-sm">{t.title}</h3>
                                                    <p className="text-xs opacity-75">Награда: {t.reward}</p>
                                                    {t.progress && !t.task?.completed && <p className="text-xs text-cyan-400 mt-0.5">Прогресс: {t.progress}</p>}
                                                </div>
                                                {t.task?.completed && <span className="text-green-400 text-xl">✅</span>}
                                            </div>
                                            <button onClick={() => completeTask(t.id)} disabled={t.task?.completed} className={`w-full py-2 rounded-lg text-sm mobile-btn ${t.task?.completed ? 'bg-green-600' : 'bg-blue-600'}`}>
                                                {t.task?.completed ? 'Выполнено' : 'Выполнить'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentScreen === 'profile' && (
                            <div>
                                <div className="glass rounded-xl p-2.5 mb-3 flex justify-between items-center">
                                    <span className="text-gray-400 text-sm">🟢 Онлайн: {onlineCount}</span>
                                </div>
                                <h2 className="text-2xl font-bold mb-4 text-center">👤 Профиль</h2>
                                <div className="glass rounded-xl p-4 text-center mb-4">
                                    <h3 className="text-lg font-bold">{user?.name}</h3>
                                </div>
                                <div className="flex gap-2 mb-3">
                                    <button onClick={() => setShowTopUp(true)} className="flex-1 bg-gradient-to-r from-yellow-400 to-orange-500 text-gray-900 font-bold py-3 rounded-xl text-sm mobile-btn">💎 Пополнить</button>
                                </div>
                                
                                <button onClick={() => setShowWithdrawModal(true)} className={`w-full font-bold py-3 rounded-xl text-sm mb-3 mobile-btn ${tasks.depositMajor?.completed ? 'bg-green-600 shadow-[0_0_15px_rgba(34,197,94,0.5)]' : 'bg-gray-600 opacity-80'}`}>
                                    {tasks.depositMajor?.completed ? '🏆 Вывести призы' : '🔒 Вывести призы'}
                                </button>

                                <div className="glass rounded-xl p-3 mb-3">
                                    <h3 className="font-bold mb-2 text-sm">🎁 Промокод</h3>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="ПРОМОКОД" value={promoCode} onChange={e => setPromoCode(e.target.value)} className="flex-1 bg-gray-700/50 border border-gray-600 rounded-lg px-3 py-2 text-center uppercase text-sm" />
                                        <button onClick={checkPromo} className="bg-indigo-600 px-4 py-2 rounded-lg font-bold text-sm">OK</button>
                                    </div>
                                    {promoSuccess && <p className="text-green-400 text-xs mt-2 text-center">{promoSuccess}</p>}
                                    {promoError && <p className="text-red-400 text-xs mt-2 text-center">{promoError}</p>}
                                </div>

                                <div className="glass rounded-xl p-3">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-bold text-sm">🎒 Инвентарь</h3>
                                        <span className="text-xs text-gray-400">{inventory.length}/{inventorySlots}</span>
                                    </div>
                                    <div className="grid grid-cols-5 gap-2 mb-2">
                                        {[...Array(inventorySlots)].map((_, i) => (
                                            <div key={i} className="aspect-square bg-gray-700/50 rounded-lg flex items-center justify-center text-xl cursor-pointer hover:bg-gray-600/50 transition">
                                                {inventory[i] ? <span onClick={() => sellItem(inventory[i])} className="hover:scale-110 transition">{inventory[i].emoji}</span> : <span className="text-gray-600 text-xs">○</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-1.5 z-40">
                        <div className="max-w-md mx-auto flex justify-around">
                            {[
                                { id: 'tasks', emoji: '📋', label: 'Задания' },
                                { id: 'cases', emoji: '🎁', label: 'Кейсы' },
                                { id: 'events', emoji: '🏛️', label: 'Ивенты' },
                                { id: 'games', emoji: '🎮', label: 'Игры' },
                                { id: 'profile', emoji: '👤', label: 'Профиль' }
                            ].map(s => (
                                <button key={s.id} onClick={() => { setCurrentScreen(s.id); if (s.id === 'events') setEventSubScreen('main'); }} className={`flex flex-col items-center p-1.5 rounded-lg transition ${currentScreen === s.id ? 'events-tab-active text-yellow-400 scale-110' : 'text-gray-400 hover:text-white'}`}>
                                    <span className="text-xl">{s.emoji}</span>
                                    <span className="text-[10px] font-bold">{s.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {selectedCase && (
                        <div className="fullscreen-modal flex items-center justify-center p-3">
                            <div className="w-full max-w-lg" ref={rouletteContainerRef}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold">{selectedCase.emoji} {selectedCase.name}</h3>
                                    <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="text-3xl hover:text-red-400">×</button>
                                </div>
                                <div className="roulette-container mb-4">
                                    <div className="roulette-pointer" />
                                    <div key={rouletteKey} className="roulette-inner" style={{ transform: `translateX(${rouletteOffset}px)` }}>
                                        {fakeItems.length > 0 ? fakeItems.map((item, i) => (
                                            <div key={i} className="roulette-item"><div className="emoji">{item.emoji}</div><div className="name">{item.name}</div></div>
                                        )) : [...Array(80)].map((_, i) => <div key={i} className="roulette-item"><div className="emoji">❓</div></div>)}
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-3 mb-4 max-h-36 overflow-y-auto">
                                    <div className="space-y-1">{CASE_REWARDS[selectedCase.id]?.map((r, i) => (
                                        <div key={i} className="flex justify-between py-0.5 border-b border-white/10 last:border-0 text-xs">
                                            <span>{r.emoji} {r.name}</span><span className="text-yellow-400 font-bold">{r.displayChance}</span>
                                        </div>
                                    ))}</div>
                                </div>
                                {spinResult ? (
                                    <div className="text-center">
                                        <p className="text-xl font-bold mb-2">🎉 {spinResult.name}!</p>
                                        <button onClick={() => { setSpinResult(null); openCase(selectedCase.id); }} className="w-full bg-green-600 py-3 rounded-xl font-bold mb-2 mobile-btn">Ещё раз</button>
                                        <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="w-full bg-gray-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">К кейсам</button>
                                    </div>
                                ) : (
                                    <button onClick={() => openCase(selectedCase.id)} disabled={isSpinning || (selectedCase.id === 'daily' && selectedCase.freeCount === 0)} className="w-full bg-gradient-to-r from-indigo-500 to-purple-500 py-4 rounded-xl font-bold text-lg disabled:opacity-50 mobile-btn">
                                        {isSpinning ? '🌀 Крутим...' : (selectedCase.id === 'daily' && selectedCase.freeCount === 0 ? dailyCaseTimeLeft : `Открыть за ${getCasePrice(selectedCase.id) === 0 ? 'Бесплатно' : getCasePrice(selectedCase.id) + '⭐️'}`)}
                                    </button>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {showTopUp && (
                         <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-3">
                            <div className="glass rounded-2xl p-4 max-w-sm w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-lg font-bold">💳 Пополнение</h3>
                                    <button onClick={() => setShowTopUp(false)} className="text-2xl hover:text-red-400">×</button>
                                </div>
                                <div className="space-y-2 mb-3">
                                    {STARS_PACKAGES.map(pkg => (
                                        <button key={pkg.stars} onClick={() => buyStars(pkg)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-white/10">
                                            <span className="font-bold text-yellow-400 text-sm">+{pkg.stars} ⭐️</span>
                                            <span className="text-gray-300 text-xs">Купить</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
