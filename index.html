                    await db.ref(`users/${user.id}/inventorySlots`).set(inventorySlots + 1);
                    alert('📈 +1 слот инвентаря!');
                } else if (won.type === 'olympus_dionysus') {
                    nb += 80; setBalance(nb);
                    await db.ref(`users/${user.id}/balance`).set(nb);
                    alert('🍷 +80⭐️!');
                } else if (won.type === 'olympus_apollo') {
                    const nc = { ...cases, star: { ...cases.star, freeCount: (cases.star.freeCount || 0) + 5 } };
                    setCases(nc);
                    await db.ref(`users/${user.id}/cases/star/freeCount`).set((cases.star.freeCount || 0) + 5);
                    alert('☀️ +5 кейсов Звездный!');
                } else if (won.type === 'olympus_poseidon') {
                    setOlympusRewardModalData({ type: 'poseidon' });
                    setShowOlympusRewardModal(true);
                    return;
                } else if (won.type === 'olympus_hades') {
                    setOlympusRewardModalData({ type: 'hades' });
                    setShowOlympusRewardModal(true);
                    return;
                } else if (won.type === 'olympus_zeus') {
                    setOlympusRewardModalData({ type: 'zeus' });
                    setShowOlympusRewardModal(true);
                    return;
                }
                setOlympusSpinResult(null);
            };

            const handlePoseidonChoice = async (choice) => {
                if (choice === 'stars') {
                    const nb = balance + 200; setBalance(nb);
                    await db.ref(`users/${user.id}/balance`).set(nb);
                    alert('🔱 +200⭐️!');
                } else {
                    const nc = { ...cases, platinum: { ...cases.platinum, freeCount: (cases.platinum.freeCount || 0) + 5 } };
                    setCases(nc);
                    await db.ref(`users/${user.id}/cases/platinum/freeCount`).set((cases.platinum.freeCount || 0) + 5);
                    alert('🔱 +5 кейсов Платина!');
                }
                setShowOlympusRewardModal(false); setOlympusSpinResult(null);
            };

            const handleHadesChoice = async (choice) => {
                if (choice === 'stars') {
                    const nb = balance + 250; setBalance(nb);
                    await db.ref(`users/${user.id}/balance`).set(nb);
                    alert('🔥 +250⭐️!');
                } else {
                    const nc = { ...cases, collector: { ...cases.collector, locked: false, freeCount: (cases.collector.freeCount || 0) + 1 } };
                    setCases(nc);
                    await db.ref(`users/${user.id}/cases`).set(nc);
                    alert('🔥 Коллекционер разблокирован!');
                }
                setShowOlympusRewardModal(false); setOlympusSpinResult(null);
            };

            const handleZeusChoice = async (choice) => {
                if (choice === 'wake') {
                    const nc = { ...cases, collector: { ...cases.collector, locked: false, freeCount: (cases.collector.freeCount || 0) + 2 } };
                    setCases(nc);
                    await db.ref(`users/${user.id}/cases`).set(nc);
                    alert('⚡ Зевс проснулся! +2 кейса Коллекционер!');
                } else {
                    await addToInventory({ id: 'zeus', name: 'Зевс ⚡', emoji: '⚡', type: 'olympus_zeus_kept' });
                    alert('⚡ Зевс сохранён в инвентаре!');
                }
                setShowOlympusRewardModal(false); setOlympusSpinResult(null);
            };

            const checkOlympusProgress = async (opens, currentBalance) => {
                let nb = currentBalance;
                let nc = { ...cases };
                let claimed = [...olympusRewardsClaimed];
                let changed = false;
                for (const step of OLYMPUS_PROGRESS) {
                    if (opens >= step.required && !claimed.includes(step.reward)) {
                        claimed.push(step.reward);
                        changed = true;
                        if (step.type === 'case') {
                            nc[step.caseType] = { ...nc[step.caseType], freeCount: (nc[step.caseType].freeCount || 0) + step.count };
                        } else if (step.type === 'stars') {
                            nb += step.value;
                        } else if (step.type === 'item') {
                            await addToInventory(step.item);
                        } else if (step.type === 'mega') {
                            nc.star = { ...nc.star, freeCount: (nc.star.freeCount || 0) + 25 };
                            nb += 1000;
                        }
                    }
                }
                if (changed) {
                    setBalance(nb); setCases(nc); setOlympusRewardsClaimed(claimed);
                    await db.ref(`users/${user.id}`).update({ balance: nb, cases: nc, olympusRewardsClaimed: claimed });
                }
            };

            const addToInventory = async (item) => {
                if (inventory.length >= inventorySlots) { alert('Инвентарь полон!'); return; }
                const ni = [...inventory, { ...item, uniqueId: Date.now(), collected: Date.now() }];
                setInventory(ni);
                await db.ref(`users/${user.id}/inventory`).set(ni);
            };

            const sellItem = async (item) => {
                if (item.type === 'random_case_box') { setRandomCaseItem(item); setShowRandomCaseModal(true); return; }
                if (item.type === 'collectible') { setSelectedCollectible(item); setShowCollectibleModal(true); return; }
                if (item.type === 'olympus_item') {
                    if (confirm(`Продать ${item.name} за ${item.sellPrice}⭐️?`)) {
                        const nb = balance + item.sellPrice;
                        const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);
                        setBalance(nb); setInventory(ni);
                        await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni });
                    }
                    return;
                }
                if (item.type === 'flower_item') {
                    if (item.sellType === 'case') {
                        if (confirm(`Обменять ${item.name} на ${item.sellCount} кейс(ов) ${item.sellCase === 'star' ? 'Звездный⭐️' : item.sellCase === 'diamond' ? 'Алмаз💎' : ''}?`)) {
                            const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);
                            const nc = { ...cases, [item.sellCase]: { ...cases[item.sellCase], freeCount: (cases[item.sellCase].freeCount || 0) + item.sellCount } };
                            setInventory(ni); setCases(nc);
                            await db.ref(`users/${user.id}`).update({ inventory: ni, cases: nc });
                        }
                    } else {
                        if (confirm(`Оставьте ${item.name} или продайте за ${item.sellPrice}⭐️?`)) {
                            const nb = balance + item.sellPrice;
                            const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);
                            setBalance(nb); setInventory(ni);
                            await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni });
                        }
                    }
                    return;
                }
                if (item.type === 'olympus_hermes' || item.type === 'olympus_dionysus' || item.type === 'olympus_apollo' || item.type === 'olympus_poseidon' || item.type === 'olympus_hades' || item.type === 'olympus_zeus' || item.type === 'olympus_zeus_kept') {
                    setSelectedCollectible(item); setShowCollectibleModal(true); return;
                }
                if (item.sellPrice && confirm(`Продать ${item.name} за ${item.sellPrice}⭐️?`)) {
                    const nb = balance + item.sellPrice;
                    const ni = inventory.filter(i => i.uniqueId !== item.uniqueId);
                    setBalance(nb); setInventory(ni);
                    await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni });
                }
            };

            const exchangeRandomCaseBox = async () => {
                const keys = ['cardboard', 'coal', 'platinum', 'diamond', 'money', 'gold', 'elite', 'collector'];
                const rKey = keys[Math.floor(Math.random() * keys.length)];
                const ni = inventory.filter(i => i.uniqueId !== randomCaseItem.uniqueId);
                const nc = { ...cases, [rKey]: { ...cases[rKey], freeCount: (cases[rKey].freeCount || 0) + 1 } };
                if (rKey === 'collector') nc.collector.locked = false;
                setInventory(ni); setCases(nc);
                await db.ref(`users/${user.id}`).update({ inventory: ni, cases: nc });
                setShowRandomCaseModal(false); setRandomCaseItem(null);
                alert(`Выпал кейс: ${cases[rKey].name}!`);
            };

            const unlockSlot = async () => {
                if (balance < 50) return;
                const nb = balance - 50;
                setBalance(nb); setInventorySlots(s => s + 1);
                await db.ref(`users/${user.id}`).update({ balance: nb, inventorySlots: inventorySlots + 1 });
            };

            const doGefestTrade = async (trade) => {
                const now = Date.now();
                if (now - gefestLastTrade < 180000) {
                    const remaining = Math.ceil((180000 - (now - gefestLastTrade)) / 1000);
                    alert(`Подождите ${remaining} сек. до следующего обмена!`);
                    return;
                }
                const itemIndex = inventory.findIndex(i => (i.id === trade.itemKey || i.key === trade.itemKey));
                if (itemIndex === -1) { alert('Предмет не найден в инвентаре!'); return; }
                if (trade.rewardType === 'ice_choice') {
                    setGefestTradeChoice(trade);
                    return;
                }
                const ni = [...inventory]; ni.splice(itemIndex, 1); setInventory(ni);
                setGefestLastTrade(now);
                let nb = balance;
                let nc = { ...cases };
                if (trade.rewardType === 'stars') {
                    nb += trade.value; setBalance(nb);
                } else if (trade.rewardType === 'case') {
                    nc[trade.caseType] = { ...nc[trade.caseType], freeCount: (nc[trade.caseType].freeCount || 0) + trade.count };
                    setCases(nc);
                } else if (trade.rewardType === 'slot') {
                    setInventorySlots(s => s + 1);
                    await db.ref(`users/${user.id}/inventorySlots`).set(inventorySlots + 1);
                } else if (trade.rewardType === 'wolf_special') {
                    nc.collector = { ...nc.collector, locked: false, freeCount: (nc.collector.freeCount || 0) + 2 };
                    setCases(nc);
                }
                await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni, cases: nc, gefestLastTrade: now });
                alert('Обмен совершён!');
            };

            const doIceChoice = async (choice) => {
                const trade = gefestTradeChoice;
                const itemIndex = inventory.findIndex(i => (i.id === trade.itemKey || i.key === trade.itemKey));
                if (itemIndex === -1) { alert('Предмет не найден!'); return; }
                const ni = [...inventory]; ni.splice(itemIndex, 1); setInventory(ni);
                const now = Date.now(); setGefestLastTrade(now);
                let nb = balance; let nc = { ...cases };
                if (choice === 'stars') {
                    nb += 500; setBalance(nb);
                } else {
                    nc.star = { ...nc.star, freeCount: (nc.star.freeCount || 0) + 25 };
                    setCases(nc);
                }
                await db.ref(`users/${user.id}`).update({ balance: nb, inventory: ni, cases: nc, gefestLastTrade: now });
                setGefestTradeChoice(null);
                alert('Обмен совершён!');
            };

            const startGeraklGame = async () => {
                if (balance < geraklBetInput || geraklBetInput < 25) { alert('Недостаточно звезд или ставка меньше 25!'); return; }
                const nb = balance - geraklBetInput;
                setBalance(nb);
                await db.ref(`users/${user.id}/balance`).set(nb);
                setGeraklBetAmount(geraklBetInput); setGeraklRound(0); setGeraklMultiplier(1.0);
                setGeraklCurrentWin(geraklBetInput); setGeraklTimer(25); setGeraklGameActive(true);
                setGeraklResult(null); setGeraklBoxOpened(false); setGeraklBoxPrize(null);
            };

            const handleGeraklFlame = async () => {
                if (geraklRound >= 10) { handleGeraklCashout(); return; }
                if (Math.random() < GERAKL_ICE_CHANCES[geraklRound]) { handleGeraklIce(); }
                else {
                    const nextRound = geraklRound + 1;
                    setGeraklRound(nextRound);
                    setGeraklMultiplier(GERAKL_MULTIPLIERS[nextRound]);
                    setGeraklCurrentWin(Math.floor(geraklBetAmount * GERAKL_MULTIPLIERS[nextRound]));
                    setGeraklTimer(25);
                }
            };

            const handleGeraklCashout = async () => {
                const nb = balance + geraklCurrentWin;
                setBalance(nb);
                await db.ref(`users/${user.id}/balance`).set(nb);
                setGeraklResult({ type: 'cashout', round: geraklRound, win: geraklCurrentWin, profit: geraklCurrentWin - geraklBetAmount });
                setGeraklGameActive(false);
                if (geraklRound >= 10) {
                    let cum2 = 0, r2 = Math.random() * 100, prize = GERAKL_10_REWARDS[0];
                    for (const p of GERAKL_10_REWARDS) { cum2 += p.chance; if (r2 <= cum2) { prize = p; break; } }
                    setGeraklBoxPrize(prize);
                    if (prize.type === 'stars') { const nb2 = nb + prize.value; setBalance(nb2); await db.ref(`users/${user.id}/balance`).set(nb2); }
                    else if (prize.type === 'promo') { const np = [...wonPromos, prize.code]; setWonPromos(np); await db.ref(`users/${user.id}/wonPromos`).set(np); }
                    else { await addToInventory(prize); }
                }
            };

            const handleGeraklIce = () => { setGeraklResult({ type: 'ice', round: geraklRound }); setGeraklGameActive(false); };
            const exitGeraklGame = () => { setGeraklGameActive(false); setGeraklResult(null); setGeraklBoxOpened(false); setGeraklBoxPrize(null); setCurrentGame(null); };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center"><div className="text-2xl animate-pulse">⏳ Загрузка...</div></div>;

            if (currentGame?.type === 'gerakl') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-red-900 via-orange-900 to-red-800 pb-4" style={{ backgroundImage: "url('gerakl.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                        <div className="max-w-lg mx-auto p-3">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-xl font-bold">🪬 13 Подвиг Геракла 🌊</h1>
                                <button onClick={exitGeraklGame} className="bg-red-600/40 hover:bg-red-600 border border-red-500/50 px-3 py-1.5 rounded-xl font-bold text-sm">✕ Выйти</button>
                            </div>
                            {geraklResult ? (
                                <div className="glass rounded-xl p-4 mb-3 text-center border border-yellow-500/30">
                                    {geraklResult.type === 'ice' ? (
                                        <div><div className="text-5xl mb-2">🧊</div><div className="font-bold text-red-400 text-xl mb-2">ЛЁД!</div><div className="text-gray-300 text-sm mb-1">Продержались: {geraklResult.round} раундов</div><div className="text-gray-400 text-sm mb-3">Ставка: {geraklBetAmount}⭐️ | Выигрыш: 0⭐️</div><button onClick={exitGeraklGame} className="w-full bg-gray-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">Выйти</button></div>
                                    ) : (
                                        <div><div className="text-5xl mb-2">🎉</div><div className="font-bold text-green-400 text-xl mb-2">Вы забрали выигрыш!</div><div className="text-yellow-400 font-bold text-lg mb-1">Выигрыш: {geraklResult.win}⭐️</div><div className="text-green-400 text-sm mb-3">Прибыль: +{geraklResult.profit}⭐️</div>
                                            {geraklBoxPrize && !geraklBoxOpened && <div className="text-7xl mb-3 cursor-pointer hover:scale-110 transition active:scale-95" onClick={() => setGeraklBoxOpened(true)}>📦</div>}
                                            {geraklBoxPrize && geraklBoxOpened && <div className="bg-gray-800/60 rounded-xl p-3 mb-3"><p className="text-3xl">{geraklBoxPrize.emoji}</p><p className="text-white font-bold mt-1">{geraklBoxPrize.name}</p></div>}
                                            <button onClick={exitGeraklGame} className="w-full bg-green-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">Выйти</button>
                                        </div>
                                    )}
                                </div>
                            ) : geraklGameActive ? (
                                <div className="glass rounded-xl p-4 mb-3 text-center border border-yellow-500/30">
                                    <div className="text-5xl font-bold text-yellow-400 mb-2">{geraklTimer}</div>
                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div className="bg-gray-800/60 rounded-lg p-3"><div className="text-gray-400 text-xs mb-1">Выигрыш</div><div className="text-2xl font-bold text-yellow-400">{geraklCurrentWin}⭐️</div></div>
                                        <div className="bg-gray-800/60 rounded-lg p-3"><div className="text-gray-400 text-xs mb-1">Множитель</div><div className="text-2xl font-bold text-orange-400">{geraklMultiplier}x</div></div>
                                    </div>
                                    <div className="flex gap-2 mb-4">
                                        <button onClick={handleGeraklFlame} className="flex-1 bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn">🔥 Пламя</button>
                                        <button onClick={handleGeraklCashout} className="flex-1 bg-gradient-to-r from-cyan-600 to-blue-600 py-3 rounded-xl font-bold text-sm mobile-btn">🧊 Забрать</button>
                                    </div>
                                    <div className="flex justify-center flex-wrap">{[...Array(10)].map((_, i) => <div key={i} className={`round-box ${i < geraklRound ? 'completed' : i === geraklRound ? 'current' : ''}`}>{i + 1}</div>)}</div>
                                </div>
                            ) : (
                                <div className="glass rounded-xl p-4 text-center border border-yellow-500/30">
                                    <div className="text-3xl mb-2 animate-bounce">🪬</div>
                                    <div className="font-bold text-yellow-300 text-lg mb-3">Соверши 13 подвиг!</div>
                                    <div className="flex gap-2 mb-3">
                                        <input type="number" min="25" value={geraklBetInput} onChange={e => setGeraklBetInput(Math.max(25, Number(e.target.value)))} className="flex-1 bg-gray-800 border border-yellow-600 rounded-lg p-2.5 text-center text-lg text-white" />
                                        <button onClick={() => setGeraklBetInput(p => p + 25)} className="bg-yellow-700 px-3 rounded-lg font-bold text-sm">+25</button>
                                        <button onClick={() => setGeraklBetInput(p => p + 100)} className="bg-yellow-700 px-3 rounded-lg font-bold text-sm">+100</button>
                                    </div>
                                    <button onClick={startGeraklGame} disabled={balance < geraklBetInput} className="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-2.5 rounded-xl font-bold disabled:opacity-50 text-sm mobile-btn">Начать ({geraklBetInput}⭐️)</button>
                                    <p className="text-xs text-gray-500 mt-1">Баланс: {balance.toFixed(0)}⭐️</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (currentGame?.type === 'hades') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-gray-900 via-red-900 to-black pb-4" style={{ backgroundImage: "url('evil.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                        <div className="max-w-lg mx-auto p-3">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-xl font-bold text-red-400 hades-neon olympus-font">🔥 Подземелье Аида 🔥</h1>
                                <button onClick={exitHadesGame} className="bg-red-600/40 hover:bg-red-600 border border-red-500/50 px-3 py-1.5 rounded-xl font-bold text-sm">✕ Выйти</button>
                            </div>

                            {hadesScreen === 'intro' && (
                                <div className="glass rounded-xl p-4 text-center border border-red-500/30">
                                    <div className="text-5xl mb-3">🎟</div>
                                    <h2 className="text-xl font-bold text-red-300 mb-2 olympus-font">Билет судьбы</h2>
                                    <p className="text-gray-300 text-sm mb-4">У вас: {fateTickets} 🎟</p>
                                    <button onClick={enterHadesGame} className="w-full bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn mb-2">
                                        {fateTickets > 0 ? 'Войти (1 🎟)' : 'Купить билет за 5⭐️'}
                                    </button>
                                    {fateTickets === 0 && (
                                        <button onClick={() => { setCurrentGame(null); setShowTopUp(true); }} className="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-2 rounded-xl font-bold text-sm mobile-btn">
                                            Купить билет (5⭐️)
                                        </button>
                                    )}
                                </div>
                            )}

                            {hadesScreen === 'buy' && (
                                <div className="glass rounded-xl p-4 text-center border border-red-500/30">
                                    <p className="text-gray-300 mb-4">Для входа требуется 1 билет судьбы 🎟</p>
                                    <button onClick={() => { setCurrentGame(null); setShowTopUp(true); }} className="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn">
                                        Купить билет за 5⭐️
                                    </button>
                                    <button onClick={() => setHadesScreen('intro')} className="w-full bg-gray-600 py-2 rounded-xl text-sm mt-2">Назад</button>
                                </div>
                            )}

                            {hadesScreen === 'instruction' && (
                                <div className="hades-instruction rounded-xl p-4 text-center">
                                    <div className="text-4xl mb-2">🏵</div>
                                    <h2 className="text-lg font-bold text-yellow-300 mb-2 olympus-font hades-neon">Инструкция</h2>
                                    <p className="text-gray-200 text-sm mb-4 olympus-font">
                                        Приветствую в игре!<br/>
                                        За один вход вы предоставляете 1 особый билет судьбы 🎟!<br/>
                                        Перед вами 8 дверей судьбы.<br/>
                                        В одной из них находится особый приз — NFT подарок,<br/>
                                        в других — поощрительные ⭐️ проекта.<br/>
                                        Жми на дверь, чтобы открыть её!
                                    </p>
                                    <button onClick={startHadesGame} className="w-full bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn hades-neon">Продолжить</button>
                                </div>
                            )}

                            {hadesScreen === 'game' && (
                                <div className="glass rounded-xl p-4 border border-red-500/30">
                                    <div className="main-prize-display">
                                        <div className="label">Главный приз этой игры</div>
                                        <span className="emoji">{hadesProPrize?.emoji}</span>
                                        <div className="name">{hadesProPrize?.name}</div>
                                    </div>

                                    <div className="text-center mb-4">
                                        <p className="text-red-400 font-bold text-3xl hades-neon">{hadesTimer}</p>
                                    </div>

                                    <div className="door-grid mb-4">
                                        {hadesDoors.map((opened, i) => (
                                            <div key={i} onClick={() => openHadesDoor(i)} className={`door ${opened ? 'opened' : ''}`}>
                                                {!opened && <img src="door.jpg" alt="Door" className="door-image" />}
                                                {opened && hadesDoorRewards[i] && (
                                                    <>
                                                        <span className="reward-emoji">{hadesDoorRewards[i].emoji}</span>
                                                        <span className="reward-value">+{hadesDoorRewards[i].value}⭐️</span>
                                                    </>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-4">
                                        <h3 className="text-center text-sm font-bold text-yellow-400 mb-2 olympus-font">Возможные главные призы</h3>
                                        <div className="hades-rewards-grid mb-3">
                                            {HADES_PRO_PRIZES.slice(0, 4).map((prize, i) => (
                                                <div key={i} className="hades-reward-item">
                                                    <span className="emoji">{prize.emoji}</span>
                                                    <span className="name">{prize.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <h3 className="text-center text-sm font-bold text-orange-400 mb-2 olympus-font">Возможные награды</h3>
                                        <div className="hades-rewards-grid">
                                            {HADES_REWARDS.map((reward, i) => (
                                                <div key={i} className="hades-reward-item">
                                                    <span className="emoji">{reward.emoji}</span>
                                                    <span className="name">{reward.name}</span>
                                                    <span className="chance">{reward.chance}%</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {hadesReward && (
                                <div className="glass rounded-xl p-4 text-center border border-red-500/30">
                                    <div className="text-5xl mb-3">{hadesReward.emoji}</div>
                                    <h2 className="text-xl font-bold text-yellow-300 mb-2 olympus-font">{hadesReward.name}</h2>
                                    {hadesReward.value > 0 && <p className="text-green-400 font-bold text-lg">+{hadesReward.value}⭐️</p>}
                                    <button onClick={exitHadesGame} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn mt-4">Покинуть игру</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (currentGame?.type === 'flower_bank') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-pink-900 via-rose-900 to-pink-800 pb-4" style={{ backgroundImage: "url('roza.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                        <div className="max-w-lg mx-auto p-3">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-xl font-bold text-pink-300">💐 Банк цветов 💐</h1>
                                <button onClick={() => setCurrentGame(null)} className="bg-pink-600/40 hover:bg-pink-600 border border-pink-500/50 px-3 py-1.5 rounded-xl font-bold text-sm">✕ Выйти</button>
                            </div>

                            <div className="text-center mb-4">
                                <span className="bg-pink-500/30 text-pink-300 px-3 py-1 rounded-full text-xs font-bold">Временное событие!</span>
                            </div>

                            {!flowersUnlocked ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="text-4xl mb-2">🔒</div>
                                    <p className="text-pink-300 font-bold mb-2">Открытие 8.03.2026 12:30 МСК</p>
                                    <p className="text-gray-300 text-sm">Осталось: {flowersTimeLeft}</p>
                                </div>
                            ) : flowerBankReward ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="text-6xl mb-3">{flowerBankReward.emoji}</div>
                                    <h2 className="text-xl font-bold text-pink-300 mb-2">{flowerBankReward.name}</h2>
                                    <p className="text-gray-300 text-sm mb-4">Награда добавлена в инвентарь!</p>
                                    <button onClick={() => { setFlowerBankReward(null); setFlowerBankPlanted(false); setFlowerBankReady(false); }} className="w-full bg-pink-600 py-3 rounded-xl font-bold text-sm mobile-btn">Посадить ещё</button>
                                </div>
                            ) : flowerBankReady ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="text-5xl mb-3">🌸</div>
                                    <h2 className="text-xl font-bold text-green-400 mb-2">Цветок созрел!</h2>
                                    <button onClick={collectFlowerReward} className="w-full bg-gradient-to-r from-green-600 to-emerald-600 py-3 rounded-xl font-bold text-sm mobile-btn">Собрать награду</button>
                                </div>
                            ) : flowerBankPlanted ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="flower-bubble planted mb-4">🌱</div>
                                    <h2 className="text-xl font-bold text-pink-300 mb-2">Растет...</h2>
                                    <div className="flower-countdown">{flowerBankTimeLeft}</div>
                                    <p className="text-gray-400 text-sm">До созревания</p>
                                </div>
                            ) : (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="flower-bubble mb-4">🌺</div>
                                    <h2 className="text-xl font-bold text-pink-300 mb-2">Посади цветок!</h2>
                                    <p className="text-gray-300 text-sm mb-4">Через 6 часов собери награду</p>
                                    <button onClick={plantFlower} className="w-full bg-gradient-to-r from-pink-600 to-rose-600 py-3 rounded-xl font-bold text-sm mobile-btn">Посадить цветок💮</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (isAdmin) {
                const filteredUsers = allUsers.filter(u => !adminUserSearch || (u.name && u.name.toLowerCase().includes(adminUserSearch.toLowerCase())) || (u.id && u.id.includes(adminUserSearch)));
                return (
                    <div className="min-h-screen bg-gray-900 p-4">
                        <div className="max-w-lg mx-auto">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-xl font-bold">🔐 Админ</h1>
                                <button onClick={() => setIsAdmin(false)} className="text-gray-400">Выйти</button>
                            </div>
                            <div className="flex gap-2 mb-4 overflow-x-auto">
                                {['stats', 'users', 'rewards', 'settings'].map(tab => <button key={tab} onClick={() => setAdminScreen(tab)} className={`px-3 py-2 rounded-lg text-sm ${adminScreen === tab ? 'bg-indigo-600' : 'bg-gray-700'}`}>{tab === 'stats' ? '📊' : tab === 'users' ? '👥' : tab === 'rewards' ? '🎀' : '⚙️'} {tab}</button>)}
                            </div>
                            <div className="glass rounded-xl p-4">
                                {adminScreen === 'stats' && (
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-gray-800 p-3 rounded-lg"><div className="text-gray-400 text-xs">Игроков</div><div className="text-2xl font-bold">{allUsers.length}</div></div>
                                        <div className="bg-gray-800 p-3 rounded-lg"><div className="text-gray-400 text-xs">Общий баланс</div><div className="text-xl font-bold">{allUsers.reduce((s, u) => s + (u.balance || 0), 0).toFixed(0)}⭐️</div></div>
                                    </div>
                                )}
                                {adminScreen === 'users' && !selectedUser && (
                                    <div>
                                        <input type="text" placeholder="🔍 Поиск..." value={adminUserSearch} onChange={e => setAdminUserSearch(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm mb-3" />
                                        <div className="space-y-2 max-h-80 overflow-y-auto">
                                            {filteredUsers.map(u => <div key={u.id} onClick={() => setSelectedUser(u)} className="bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 flex justify-between"><div><div className="font-bold text-sm">{u.name}</div><div className="text-xs text-gray-400">{u.id.slice(0, 12)}</div></div><div className="text-yellow-400 text-sm">{(u.balance || 0).toFixed(0)}⭐️</div></div>)}
                                        </div>
                                    </div>
                                )}
                                {adminScreen === 'users' && selectedUser && (
                                    <div>
                                        <h3 className="font-bold mb-3">👤 {selectedUser.name}</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-3">
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'stars', amount: 100 })} className="bg-green-600 p-2 rounded text-xs">+100⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'stars', amount: 500 })} className="bg-green-600 p-2 rounded text-xs">+500⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'stars', amount: 1000 })} className="bg-green-600 p-2 rounded text-xs">+1000⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'case', caseType: 'diamond', count: 5 })} className="bg-blue-600 p-2 rounded text-xs">+5💎</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'case', caseType: 'elite', count: 2 })} className="bg-red-600 p-2 rounded text-xs">+2🎖</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'unlock_collector' })} className="bg-pink-600 p-2 rounded text-xs">🔓Коллекц.</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'reset_daily' })} className="bg-cyan-600 p-2 rounded text-xs">🗓️Сброс</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'item', item: { id: 'random_case_box', name: 'Случайный кейс', emoji: '📦', type: 'random_case_box' } })} className="bg-amber-600 p-2 rounded text-xs">📦Ящик</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'fate_ticket', count: 5 })} className="bg-red-700 p-2 rounded text-xs">+5🎟</button>
                                        </div>
                                        <button onClick={() => setSelectedUser(null)} className="w-full bg-gray-600 p-2 rounded text-sm">← Назад</button>
                                    </div>
                                )}
                                {adminScreen === 'rewards' && (
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => adminGiveReward(user.id, { type: 'stars', amount: 10000 })} className="bg-indigo-600 p-3 rounded text-sm">+10000⭐️</button>
                                        <button onClick={() => adminGiveReward(user.id, { type: 'case', caseType: 'diamond', count: 10 })} className="bg-blue-600 p-3 rounded text-sm">+10💎</button>
                                        <button onClick={() => adminGiveReward(user.id, { type: 'unlock_collector' })} className="bg-pink-600 p-3 rounded text-sm">🔓Коллекц.</button>
                                        <button onClick={() => adminGiveReward(user.id, { type: 'reset_daily' })} className="bg-cyan-600 p-3 rounded text-sm">🗓️Сброс</button>
                                    </div>
                                )}
                                {adminScreen === 'settings' && (
                                    <button onClick={async () => { if (confirm('Удалить ВСЕ данные?')) { await db.ref('users/' + user.id).remove(); localStorage.removeItem('sbs_user_id'); window.location.reload(); } }} className="bg-red-600 px-4 py-2 rounded-lg text-sm">🗑 Сбросить аккаунт</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const renderEventMain = () => (
                <div className="min-h-[70vh] rounded-xl p-4 relative" style={{ backgroundImage: "url('event.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/50 rounded-xl"></div>
                    <div className="relative z-10">
                        <h2 className="text-3xl font-bold text-center olympus-font neon-text mb-6" style={{ color: '#fbbf24' }}>⚡ ОЛИМП ⚡</h2>
                        <div className="flex flex-col gap-4 max-w-xs mx-auto">
                            <button onClick={() => { loadOlympusTop(); setEventSubScreen('heroes'); }} className="w-full py-4 rounded-xl font-bold text-lg olympus-font mobile-btn" style={{ background: 'linear-gradient(135deg, rgba(251,191,36,0.4), rgba(245,158,11,0.3))', border: '2px solid #fbbf24', textShadow: '0 0 10px #fbbf24' }}>🏆 Герои Олимпа</button>
                            <button onClick={() => setEventSubScreen('treasure')} className="w-full py-4 rounded-xl font-bold text-lg olympus-font mobile-btn" style={{ background: 'linear-gradient(135deg, rgba(139,92,246,0.4), rgba(109,40,217,0.3))', border: '2px solid #a78bfa', textShadow: '0 0 10px #a78bfa' }}>⚡ Сокровище Олимпа</button>
                            <button onClick={() => setEventSubScreen('gefest')} className="w-full py-4 rounded-xl font-bold text-lg olympus-font mobile-btn" style={{ background: 'linear-gradient(135deg, rgba(239,68,68,0.4), rgba(185,28,28,0.3))', border: '2px solid #f87171', textShadow: '0 0 10px #f87171' }}>🏵️ Лавка Гефеста</button>
                        </div>
                    </div>
                </div>
            );

            const renderTreasure = () => (
                <div className="rounded-xl p-3 relative" style={{ backgroundImage: "url('case.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', minHeight: '80vh' }}>
                    <div className="absolute inset-0 bg-black/60 rounded-xl"></div>
                    <div className="relative z-10">
                        <button onClick={() => { setEventSubScreen('main'); setOlympusSpinResult(null); setOlympusFakeItems([]); }} className="mb-3 bg-gray-700/80 px-3 py-1.5 rounded-lg text-sm font-bold">← Назад</button>
                        <h2 className="text-2xl font-bold text-center olympus-font neon-text mb-4" style={{ color: '#fbbf24' }}>⚡ Сокровище Олимпа ⚡</h2>

                        <div ref={olympusRouletteRef} className="roulette-container mb-4">
                            <div className="roulette-pointer" />
                            <div key={olympusRouletteKey} className="roulette-inner" style={{ transform: `translateX(${olympusRouletteOffset}px)` }}>
                                {olympusFakeItems.length > 0 ? olympusFakeItems.map((item, i) => (
                                    <div key={i} className="roulette-item"><div className="emoji">{item.emoji}</div><div className="name">{item.name}</div></div>
                                )) : [...Array(80)].map((_, i) => <div key={i} className="roulette-item"><div className="emoji">❓</div></div>)}
                            </div>
                        </div>

                        {olympusSpinResult ? (
                            <div className="text-center mb-4">
                                <p className="text-xl font-bold mb-2 olympus-font">🎉 {olympusSpinResult.name}!</p>
                                <div className="flex gap-2">
                                    <button onClick={() => { handleOlympusReward(olympusSpinResult); if (!['olympus_poseidon', 'olympus_hades', 'olympus_zeus'].includes(olympusSpinResult.type)) setOlympusSpinResult(null); }} className="flex-1 bg-green-600 py-3 rounded-xl font-bold text-sm mobile-btn">Забрать</button>
                                    <button onClick={() => { handleOlympusReward(olympusSpinResult); if (!['olympus_poseidon', 'olympus_hades', 'olympus_zeus'].includes(olympusSpinResult.type)) { setOlympusSpinResult(null); openOlympusCase(); } }} className="flex-1 bg-indigo-600 py-3 rounded-xl font-bold text-sm mobile-btn">Ещё раз</button>
                                </div>
                            </div>
                        ) : (
                            <button onClick={openOlympusCase} disabled={olympusSpinning} className="w-full bg-gradient-to-r from-yellow-500 to-amber-600 py-4 rounded-xl font-bold text-lg disabled:opacity-50 olympus-font mobile-btn mb-4">
                                {olympusSpinning ? '🌀 Крутим...' : (olympusFreeCount > 0 ? `Открыть БЕСПЛАТНО (${olympusFreeCount})` : 'Открыть за 77⭐️')}
                            </button>
                        )}

                        <div className="glass rounded-xl p-3 mb-4">
                            <h3 className="font-bold text-center text-sm olympus-font mb-2" style={{ color: '#fbbf24', textShadow: '0 0 8px #fbbf24' }}>Награды кейса</h3>
                            <div className="space-y-1">
                                {CASE_REWARDS.olympus.map((r, i) => (
                                    <div key={i} className="flex justify-between py-1 border-b border-white/10 last:border-0 text-xs">
                                        <span>{r.emoji} {r.name}</span>
                                        <span className="text-yellow-400 font-bold">{r.displayChance}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass rounded-xl p-3">
                            <h3 className="font-bold text-center text-sm olympus-font mb-3" style={{ color: '#fbbf24', textShadow: '0 0 8px #fbbf24' }}>📊 Прогресс ({olympusOpens} открытий)</h3>
                            <div className="space-y-2">
                                {OLYMPUS_PROGRESS.map((step, i) => {
                                    const done = olympusRewardsClaimed.includes(step.reward);
                                    const progress = Math.min(100, (olympusOpens / step.required) * 100);
                                    return (
                                        <div key={i} className={`progress-step rounded-lg p-2.5 border ${done ? 'done border-green-500' : 'border-white/20'}`} style={!done ? { background: 'rgba(0,0,0,0.4)' } : {}}>
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-xs font-bold">{step.label}</span>
                                                <span className="text-xs">{done ? '✅' : `${olympusOpens}/${step.required}`}</span>
                                            </div>
                                            {!done && <div className="w-full bg-gray-700 rounded-full h-1.5"><div className="bg-yellow-400 h-1.5 rounded-full transition-all" style={{ width: progress + '%' }}></div></div>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderHeroes = () => (
                <div className="rounded-xl p-4 relative" style={{ backgroundImage: "url('hero.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', minHeight: '60vh' }}>
                    <div className="absolute inset-0 bg-black/70 rounded-xl"></div>
                    <div className="relative z-10">
                        <button onClick={() => setEventSubScreen('main')} className="mb-3 bg-gray-700/80 px-3 py-1.5 rounded-lg text-sm font-bold">← Назад</button>
                        <h2 className="text-2xl font-bold text-center olympus-font neon-text mb-4" style={{ color: '#fbbf24' }}>🏆 Герои Олимпа 🏆</h2>
                        <div className="space-y-3">
                            {olympusTopPlayers.length === 0 && <p className="text-center text-gray-400">Пока нет игроков</p>}
                            {olympusTopPlayers.map((p, i) => {
                                const medals = ['🥇', '🥈', '🥉'];
                                return (
                                    <div key={p.id} className="glass rounded-xl p-3 flex items-center gap-3" style={i < 3 ? { border: '1px solid #fbbf24', boxShadow: '0 0 10px rgba(251,191,36,0.3)' } : {}}>
                                        <span className="text-2xl">{medals[i] || `#${i + 1}`}</span>
                                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-lg overflow-hidden flex-shrink-0">
                                            {p.avatar ? <img src={p.avatar} alt="" className="w-full h-full object-cover" /> : p.name?.charAt(0)?.toUpperCase()}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-sm truncate">{p.name}</div>
                                        </div>
                                        <div className="text-yellow-400 font-bold text-sm whitespace-nowrap">{p.opens} 🎁</div>
                                    </div>
                                );
                            })}
                        </div>
                        <p className="text-center text-xs text-yellow-300 mt-4 olympus-font" style={{ textShadow: '0 0 5px #fbbf24' }}>Топ 3 получат дополнительные награды в конце ивента!</p>
                    </div>
                </div>
            );

            const renderGefest = () => (
                <div className="rounded-xl p-3 relative" style={{ backgroundImage: "url('gefest.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', minHeight: '70vh' }}>
                    <div className="absolute inset-0 bg-black/70 rounded-xl"></div>
                    <div className="relative z-10">
                        <button onClick={() => setEventSubScreen('main')} className="mb-3 bg-gray-700/80 px-3 py-1.5 rounded-lg text-sm font-bold">← Назад</button>
                        <h2 className="text-2xl font-bold text-center olympus-font mb-2" style={{ color: '#fbbf24', textShadow: '0 0 15px #fbbf24, 0 0 30px #f59e0b' }}>🏵️ Лавка Гефеста 🏵️</h2>
                        <p className="text-center text-sm mb-4 olympus-font" style={{ color: '#e2e8f0', textShadow: '0 0 10px rgba(255,255,255,0.5)' }}>Обменяй свои предметы на что-нибудь ценное💎</p>
                        <div className="space-y-2">
                            {GEFEST_TRADES.map(trade => {
                                const hasItem = inventory.some(i => i.id === trade.itemKey || i.key === trade.itemKey);
                                return (
                                    <div key={trade.id} className="glass rounded-xl p-3 flex items-center gap-3" style={trade.highlight ? { border: '2px solid #ef4444', boxShadow: '0 0 15px rgba(239,68,68,0.4)' } : {}}>
                                        <span className="text-3xl">{trade.emoji}</span>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-sm" style={{ textShadow: '0 0 5px rgba(255,255,255,0.3)' }}>{trade.name}</div>
                                            <div className="text-xs text-yellow-300 font-bold" style={{ textShadow: '0 0 5px #fbbf24' }}>→ {trade.reward}</div>
                                            {trade.highlight && <span className="text-xs text-red-400 font-bold animate-pulse" style={{ textShadow: '0 0 10px #ef4444' }}>🔥 ВЫГОДНО!</span>}
                                        </div>
                                        <button onClick={() => doGefestTrade(trade)} disabled={!hasItem} className={`px-3 py-2 rounded-lg text-xs font-bold ${hasItem ? 'bg-yellow-600 hover:bg-yellow-500' : 'bg-gray-600 opacity-50'}`}>{hasItem ? 'Обменять' : 'Нет'}</button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24">
                    <header className="p-3 flex justify-between items-center glass sticky top-0 z-50">
                        <h1 onClick={handleTitleClick} className="text-lg font-bold cursor-pointer select-none hover:text-cyan-300 transition">Step By Step Game</h1>
                        <div className="flex gap-2">
                            <div className="ticket-badge px-3 py-2 rounded-full font-bold text-white shadow-lg text-sm flex items-center gap-1">
                                <span>🎟</span>
                                <span>{fateTickets}</span>
                            </div>
                            <button onClick={() => setShowTopUp(true)} className="bg-gradient-to-r from-yellow-400 to-orange-500 px-3 py-2 rounded-full font-bold text-gray-900 shadow-lg text-sm">{balance.toFixed(2)} ⭐️</button>
                        </div>
                    </header>

                    {paymentStatus && <div className="mx-3 mt-2 p-2 rounded-lg text-center text-xs bg-blue-500/20 border border-blue-500">{paymentStatus}</div>}

                    {showOlympusRewardModal && olympusRewardModalData && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full text-center">
                                {olympusRewardModalData.type === 'poseidon' && (
                                    <div>
                                        <div className="text-6xl mb-3">🔱</div>
                                        <h3 className="text-xl font-bold mb-3 olympus-font" style={{ color: '#fbbf24' }}>Посейдон!</h3>
                                        <p className="text-sm text-gray-300 mb-4">Выберите награду:</p>
                                        <div className="space-y-2">
                                            <button onClick={() => handlePoseidonChoice('stars')} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-sm mobile-btn">200⭐️</button>
                                            <button onClick={() => handlePoseidonChoice('cases')} className="w-full bg-purple-600 py-3 rounded-xl font-bold text-sm mobile-btn">5 кейсов Платина💎</button>
                                        </div>
                                    </div>
                                )}
                                {olympusRewardModalData.type === 'hades' && (

                                        <div className="text-6xl mb-3">🔥</div>

                                    </div>

                                </div>

                                    ))}
                                </div>
                            </div>

                                        </div>
                                    ))}</div>
                                </div>
                                {spinResult ? (
                                    <div className="text-center">
                                        <p className="text-xl font-bold mb-2">🎉 {spinResult.name}!</p>
                                        <button onClick={() => { setSpinResult(null); openCase(selectedCase.id); }} className="w-full bg-green-600 py-3 rounded-xl font-bold mb-2 mobile-btn">Ещё раз</button>
                                        <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="w-full bg-gray-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">К кейсам</button>
                                    </div>
                                ) : (
                                    <button onClick={() => openCase(selectedCase.id)} disabled={isSpinning || (selectedCase.id === 'daily' && selectedCase.freeCount === 0)} className="w-full bg-gradient-to-r from-indigo-500 to-purple-500 py-4 rounded-xl font-bold text-lg disabled:opacity-50 mobile-btn">
                                        {isSpinning ? '🌀 Крутим...' : (selectedCase.id === 'daily' && selectedCase.freeCount === 0 ? dailyCaseTimeLeft : `Открыть за ${getCasePrice(selectedCase.id) === 0 ? 'Бесплатно' : getCasePrice(selectedCase.id) + '⭐️'}`)}
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {showTopUp && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-3">
                            <div className="glass rounded-2xl p-4 max-w-sm w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-lg font-bold">💳 Пополнение</h3>
                                    <button onClick={() => setShowTopUp(false)} className="text-2xl hover:text-red-400">×</button>
                                </div>
                                
                                <p className="text-xs text-red-400 text-center mb-2 font-bold">🎟 БИЛЕТ СУДЬБЫ (Подземелье Аида)</p>
                                <button onClick={buyFateTicket} disabled={balance < 5} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-red-500/50 mb-4">
                                    <span className="font-bold text-red-400 text-sm">+1 🎟 Билет судьбы</span>
                                    <span className="text-yellow-400 font-bold text-sm">5 ⭐️</span>
                                </button>

                                <p className="text-xs text-gray-400 text-center mb-2">⭐️ Telegram Stars</p>
                                <div className="space-y-2 mb-3">
                                    {STARS_PACKAGES.map(pkg => (
                                        <button key={pkg.stars} onClick={() => buyStars(pkg)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-white/10">
                                            <span className="font-bold text-yellow-400 text-sm">+{pkg.stars} ⭐️</span>
                                            <span className="text-gray-300 text-xs">Купить</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="border-t border-gray-600 pt-3">
                                    <p className="text-xs text-gray-400 text-center mb-2">💎 TON</p>
                                    {TON_RATES.map(rate => (
                                        <button key={rate.stars} onClick={() => topUpBalance(rate.stars, rate.ton)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-white/10 mb-2">
                                            <span className="font-bold text-sm">+{rate.stars}⭐️</span>
                                            <span className="text-yellow-400 font-bold text-sm">{rate.ton} TON</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-1.5 z-40">
                        <div className="max-w-md mx-auto flex justify-around">
                            {[
                                { id: 'tasks', emoji: '📋', label: 'Задания' },
                                { id: 'cases', emoji: '🎁', label: 'Кейсы' },
                                { id: 'events', emoji: '🏛️', label: 'Ивенты' },
                                { id: 'games', emoji: '🎮', label: 'Игры' },
                                { id: 'profile', emoji: '👤', label: 'Профиль' }
                            ].map(s => (
                                <button key={s.id} onClick={() => { setCurrentScreen(s.id); if (s.id === 'events') setEventSubScreen('main'); }} className={`flex flex-col items-center p-1.5 rounded-lg transition ${currentScreen === s.id ? 'events-tab-active text-yellow-400 scale-110' : 'text-gray-400 hover:text-white'}`}>
                                    <span className="text-xl">{s.emoji}</span>
                                    <span className="text-[10px] font-bold">{s.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
