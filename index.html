            // Новые состояния для отслеживания платежей

            useEffect(() => {

                        localStorage.setItem('sbs_user_id', userId);
                    }
                    try {
                        const snap = await db.ref('users/' + userId).once('value');

                            const newMergedCases = {};
                            for (const caseId in INITIAL_CASES) {
                                newMergedCases[caseId] = { ...INITIAL_CASES[caseId] };
                                if (storedCases[caseId]) {
                                    newMergedCases[caseId].freeCount = storedCases[caseId].freeCount || 0;
                                    if (storedCases[caseId].locked !== undefined) newMergedCases[caseId].locked = storedCases[caseId].locked;
                                    if (caseId === 'daily' && storedCases[caseId].lastOpened) newMergedCases[caseId].lastOpened = storedCases[caseId].lastOpened;
                                }
                            }
                            setUser({ id: userId, ...userData, ...data });
                            setBalance(data.balance || 0);
                            setCases(newMergedCases);
                            setInventory(data.inventory || []);
                            setTasks(data.tasks || tasks);
                            setInventorySlots(data.inventorySlots || 5);
                            setUsedPromos(data.usedPromos || []);
                            setWonPromos(data.wonPromos || []);
                            setTotalDeposits(data.totalDeposits || 0);
                            setFreeEliteSpin(data.freeEliteSpin || 0);
                            setFateTickets(data.fateTickets || 0);
                            
                            const savedReadyTime = data.flowerBankReadyTime || 0;
                            const now = Date.now();
                            if (savedReadyTime > now) {
                                setFlowerBankPlanted(true);
                                setFlowerBankReadyTime(savedReadyTime);
                                setFlowerBankReady(false);
                            } else if (savedReadyTime > 0 && savedReadyTime <= now) {
                                setFlowerBankPlanted(false);
                                setFlowerBankReadyTime(0);
                                setFlowerBankReady(true);
                            } else {
                                setFlowerBankPlanted(false);
                                setFlowerBankReadyTime(0);
                                setFlowerBankReady(false);
                            }
                            
                            await db.ref('users/' + userId).update({ name: userData.name, username: userData.username || '', avatar: userData.avatar || '', cases: newMergedCases });
                        } else {
                            const newCases = { ...INITIAL_CASES, daily: { ...INITIAL_CASES.daily, freeCount: 1, lastOpened: 0 }, diamond: { ...INITIAL_CASES.diamond, freeCount: 5 } };
                            const newUser = { balance: 0, cases: newCases, inventory: [], tasks: tasks, inventorySlots: 5, usedPromos: [], wonPromos: [], createdAt: Date.now(), lastActive: Date.now(), totalDeposits: 0, freeEliteSpin: 0, name: userData.name, username: userData.username || '', avatar: userData.avatar || '', fateTickets: 0, flowerBankReadyTime: 0 };
                            setCases(newCases);
                            setUser({ id: userId, ...userData });
                            await db.ref('users/' + userId).set(newUser);

                    } catch (e) { console.error(e); }
                    setIsLoading(false);
                };
                initApp();
            }, []);

            useEffect(() => {
                if (!user?.id) return;
                const ref = db.ref('online/' + user.id);
                ref.set({ name: user.name, timestamp: Date.now() });
                ref.onDisconnect().remove();
                return () => ref.remove();
            }, [user?.id]);

            useEffect(() => {
                if (!user?.id || isLoading) return;
                const iv = setInterval(() => {
                    const dailyData = cases.daily;
                    db.ref('users/' + user.id).update({
                        balance, inventory, tasks, inventorySlots, usedPromos, wonPromos, lastActive: Date.now(), totalDeposits, freeEliteSpin,
                        fateTickets,
                        flowerBankReadyTime,
                        'cases/daily/lastOpened': dailyData.lastOpened,
                        'cases/daily/freeCount': dailyData.freeCount
                    });
                }, 5000);
                return () => clearInterval(iv);
            }, [balance, cases, inventory, tasks, inventorySlots, usedPromos, wonPromos, user?.id, isLoading, totalDeposits, freeEliteSpin, fateTickets, flowerBankReadyTime]);

            useEffect(() => {
                if (isLoading || !cases.daily) return;
                const DAILY_COOLDOWN = 23 * 60 * 60 * 1000;
                const timer = setInterval(() => {
                    const lastOpened = cases.daily.lastOpened || 0;
                    const now = Date.now();
                    const timePassed = now - lastOpened;
                    if (timePassed >= DAILY_COOLDOWN) {
                        if (cases.daily.freeCount === 0) setCases(prev => ({ ...prev, daily: { ...prev.daily, freeCount: 1 } }));
                        setDailyCaseTimeLeft('Доступно!');
                    } else {
                        const remaining = DAILY_COOLDOWN - timePassed;
                        const h = Math.floor(remaining / (1000*60*60));
                        const m = Math.floor((remaining % (1000*60*60)) / (1000*60));
                        const s = Math.floor((remaining % (1000*60)) / 1000);
                        setDailyCaseTimeLeft(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [cases.daily, isLoading]);

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = Date.now();
                    if (now >= FLOWERS_UNLOCK_DATE) {
                        setFlowersUnlocked(true);
                        setFlowersTimeLeft('Доступно!');
                        setCases(prev => ({ ...prev, flowers: { ...prev.flowers, locked: false } }));
                    } else {
                        const remaining = FLOWERS_UNLOCK_DATE - now;
                        const d = Math.floor(remaining / (1000*60*60*24));
                        const h = Math.floor((remaining % (1000*60*60*24)) / (1000*60*60));
                        const m = Math.floor((remaining % (1000*60*60)) / (1000*60));
                        const s = Math.floor((remaining % (1000*60)) / 1000);
                        setFlowersTimeLeft(`${d}д ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!hadesGameActive || hadesReward) return;
                const iv = setInterval(() => {
                    setHadesTimer(prev => {
                        if (prev <= 1) {
                            handleHadesTimeout();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(iv);
            }, [hadesGameActive, hadesReward]);

            useEffect(() => {
                if (!flowerBankPlanted || flowerBankReady) return;
                
                const updateTimer = () => {
                    const now = Date.now();
                    const remaining = flowerBankReadyTime - now;
                    
                    if (remaining <= 0) {
                        setFlowerBankReady(true);
                        setFlowerBankPlanted(false);
                        setFlowerBankTimeLeft('00:00:00');
                    } else {
                        const h = Math.floor(remaining / (1000 * 60 * 60));
                        const m = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((remaining % (1000 * 60)) / 1000);
                        setFlowerBankTimeLeft(`${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`);
                    }
                };

                updateTimer();
                const iv = setInterval(updateTimer, 1000);
                return () => clearInterval(iv);
            }, [flowerBankPlanted, flowerBankReady, flowerBankReadyTime]);

            useEffect(() => {
                if (!geraklGameActive || geraklResult) return;
                const iv = setInterval(() => {
                    setGeraklTimer(prev => {
                        if (prev <= 1) { handleGeraklIce(); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(iv);
            }, [geraklGameActive, geraklResult]);

            // Проверка статуса платежа
            const checkPaymentStatus = async (payload) => {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?limit=100`);
                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        for (const update of data.result) {
                            if (update.message?.successful_payment?.invoice_payload === payload) {
                                return { status: 'paid', amount: update.message.successful_payment.total_amount / 100 };
                            }
                        }
                    }
                    return { status: 'pending' };
                } catch (e) {
                    console.error('Error checking payment:', e);
                    return { status: 'error' };
                }
            };

            // ИСПРАВЛЕННАЯ функция покупки звезд через Telegram Payments 2.0
            const buyStars = async (pkg) => {
                try {
                    setPaymentStatus('Создание счета...');
                    
                    // Для покупки звезд используем XTR валюту и пустой provider_token
                    const payload = `stars_${user.id}_${pkg.stars}_${Date.now()}`;
                    
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/createInvoiceLink`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: `${pkg.stars} звёзд`,
                            description: `Покупка ${pkg.stars} звёзд для игры Step By Step`,
                            payload: payload,
                            currency: 'XTR',
                            prices: [{ label: `${pkg.stars} звёзд`, amount: pkg.price }]
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        setPaymentStatus('Ожидание оплаты...');
                        
                        if (TelegramWebApp && TelegramWebApp.openInvoice) {
                            // Открываем инвойс через WebApp
                            TelegramWebApp.openInvoice(data.result, async (status) => {
                                console.log('Invoice status:', status);
                                
                                if (status === 'paid') {
                                    // Начисляем звезды
                                    const nb = balance + pkg.stars;
                                    const nd = totalDeposits + pkg.stars;
                                    setBalance(nb);
                                    setTotalDeposits(nd);
                                    await db.ref(`users/${user.id}`).update({ 
                                        balance: nb, 
                                        totalDeposits: nd 
                                    });
                                    checkDepositTasks(nd, pkg.stars);
                                    setPaymentStatus(`✅ Зачислено ${pkg.stars} звёзд!`);
                                    setTimeout(() => setPaymentStatus(''), 3000);
                                } else if (status === 'cancelled') {
                                    setPaymentStatus('❌ Оплата отменена');
                                    setTimeout(() => setPaymentStatus(''), 3000);
                                } else if (status === 'failed') {
                                    setPaymentStatus('❌ Ошибка оплаты');
                                    setTimeout(() => setPaymentStatus(''), 3000);
                                }
                            });
                        } else {
                            // Fallback: открываем ссылку в новом окне
                            window.open(data.result, '_blank');
                            setPaymentStatus('Откройте счет в Telegram. После оплаты обновите страницу.');
                        }
                    } else {
                        console.error('Failed to create invoice:', data);
                        setPaymentStatus('❌ Ошибка создания счета');
                        setTimeout(() => setPaymentStatus(''), 3000);
                    }
                } catch (e) {
                    console.error('Payment error:', e);
                    setPaymentStatus('❌ Ошибка: ' + e.message);
                    setTimeout(() => setPaymentStatus(''), 3000);
                }
            };

            // ИСПРАВЛЕННАЯ функция покупки билета судьбы
            const buyFateTicket = async () => {
                try {
                    setPaymentStatus('Создание счета...');
                    
                    const payload = `fate_ticket_${user.id}_${Date.now()}`;
                    
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/createInvoiceLink`, {

                            title: 'Билет судьбы 🎟',

                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        setPaymentStatus('Ожидание оплаты...');
                        
                        if (TelegramWebApp && TelegramWebApp.openInvoice) {

                                    const nt = fateTickets + 1;

                                    setTimeout(() => setPaymentStatus(''), 3000);
                                } else if (status === 'cancelled') {
                                    setPaymentStatus('❌ Отменено');
                                    setTimeout(() => setPaymentStatus(''), 3000);
                                }
                            });
                        } else {
                            window.open(data.result, '_blank');
                        }
                    }
                } catch (e) {
                    setPaymentStatus('❌ Ошибка');
                    setTimeout(() => setPaymentStatus(''), 3000);
                }
            };

            const enterHadesGame = () => {
                if (fateTickets < 1) {
                    setHadesScreen('buy');
                    return;
                }
                const nt = fateTickets - 1;
                setFateTickets(nt);
                db.ref(`users/${user.id}/fateTickets`).set(nt);
                setHadesScreen('instruction');
            };

            const startHadesGame = () => {
                const randomProPrize = HADES_PRO_PRIZES[Math.floor(Math.random() * HADES_PRO_PRIZES.length)];
                setHadesProPrize(randomProPrize);
                
                setHadesDoors(Array(8).fill(false));
                setHadesDoorRewards(Array(8).fill(null));
                setHadesReward(null);
                setHadesTimer(30);
                setHadesGameActive(true);
                setHadesScreen('game');
            };

            const openHadesDoor = async (index) => {
                if (hadesDoors[index] || hadesReward) return;
                
                const rand = Math.random() * 100;
                let cumulative = 0;
                let reward = HADES_REWARDS[0];
                for (const r of HADES_REWARDS) {
                    cumulative += r.chance;
                    if (rand <= cumulative) {
                        reward = r;
                        break;
                    }
                }

                const newDoors = [...hadesDoors];
                newDoors[index] = true;
                setHadesDoors(newDoors);
                
                const newRewards = [...hadesDoorRewards];
                newRewards[index] = reward;
                setHadesDoorRewards(newRewards);
                
                setHadesGameActive(false);
                setHadesReward(reward);

                const nb = balance + reward.value;
                setBalance(nb);
                await db.ref(`users/${user.id}/balance`).set(nb);
            };

            const handleHadesTimeout = () => {
                setHadesGameActive(false);
                setHadesReward({ name: 'Время вышло!', value: 0, emoji: '⏰' });
            };

            const exitHadesGame = () => {
                setHadesScreen('intro');
                setHadesReward(null);
                setHadesDoors(Array(8).fill(false));
                setHadesDoorRewards(Array(8).fill(null));
                setHadesProPrize(null);
                setCurrentGame(null);
            };

            const plantFlower = async () => {
                const now = Date.now();
                const readyTime = now + (6 * 60 * 60 * 1000);
                setFlowerBankPlanted(true);
                setFlowerBankReadyTime(readyTime);
                setFlowerBankReady(false);
                setFlowerBankReward(null);
                await db.ref(`users/${user.id}`).update({ flowerBankReadyTime: readyTime });
            };

            const collectFlowerReward = async () => {
                const rand = Math.random() * 100;
                let cumulative = 0;
                let reward = FLOWER_BANK_REWARDS[0];
                for (const r of FLOWER_BANK_REWARDS) {
                    cumulative += r.chance;
                    if (rand <= cumulative) {
                        reward = r;
                        break;
                    }
                }

                setFlowerBankReward(reward);
                
                if (reward.type === 'flower_item') {
                    await addToInventory(reward);
                }

                setFlowerBankPlanted(false);
                setFlowerBankReady(false);
                setFlowerBankReadyTime(0);
                await db.ref(`users/${user.id}`).update({ flowerBankReadyTime: 0 });
            };

            const checkPromo = async () => {
                const code = promoCode.toUpperCase().trim();
                setPromoError(''); setPromoSuccess('');
                if (!code) return;
                if (usedPromos.includes(code)) { setPromoError('Уже использован!'); return; }

                                    <div className="text-4xl mb-2">🏵</div>
                                    <h2 className="text-lg font-bold text-yellow-300 mb-2 olympus-font hades-neon">Инструкция</h2>
                                    <p className="text-gray-200 text-sm mb-4 olympus-font">
                                        Приветствую в игре!<br/>
                                        За один вход вы предоставляете 1 особый билет судьбы 🎟!<br/>
                                        Перед вами 8 дверей судьбы.<br/>
                                        В одной из них находится особый приз — NFT подарок,<br/>
                                        в других — поощрительные ⭐️ проекта.<br/>
                                        Жми на дверь, чтобы открыть её!
                                    </p>
                                    <button onClick={startHadesGame} className="w-full bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn hades-neon">Продолжить</button>
                                </div>
                            )}

                            {hadesScreen === 'game' && (
                                <div className="glass rounded-xl p-4 border border-red-500/30">
                                    <div className="main-prize-display">
                                        <div className="label">Главный приз этой игры</div>
                                        <span className="emoji">{hadesProPrize?.emoji}</span>
                                        <div className="name">{hadesProPrize?.name}</div>
                                    </div>

                                    <div className="text-center mb-4">
                                        <p className="text-red-400 font-bold text-3xl hades-neon">{hadesTimer}</p>
                                    </div>

                                    <div className="door-grid mb-4">
                                        {hadesDoors.map((opened, i) => (
                                            <div key={i} onClick={() => openHadesDoor(i)} className={`door ${opened ? 'opened' : ''}`}>
                                                {!opened && <img src="door.jpg" alt="Door" className="door-image" />}
                                                {opened && hadesDoorRewards[i] && (
                                                    <>
                                                        <span className="reward-emoji">{hadesDoorRewards[i].emoji}</span>
                                                        <span className="reward-value">+{hadesDoorRewards[i].value}⭐️</span>
                                                    </>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-4">
                                        <h3 className="text-center text-sm font-bold text-yellow-400 mb-2 olympus-font">Возможные главные призы</h3>
                                        <div className="hades-rewards-grid mb-3">
                                            {HADES_PRO_PRIZES.slice(0, 4).map((prize, i) => (
                                                <div key={i} className="hades-reward-item">
                                                    <span className="emoji">{prize.emoji}</span>
                                                    <span className="name">{prize.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <h3 className="text-center text-sm font-bold text-orange-400 mb-2 olympus-font">Возможные награды</h3>
                                        <div className="hades-rewards-grid">
                                            {HADES_REWARDS.map((reward, i) => (
                                                <div key={i} className="hades-reward-item">
                                                    <span className="emoji">{reward.emoji}</span>
                                                    <span className="name">{reward.name}</span>
                                                    <span className="chance">{reward.chance}%</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {hadesReward && (
                                <div className="glass rounded-xl p-4 text-center border border-red-500/30">
                                    <div className="text-5xl mb-3">{hadesReward.emoji}</div>
                                    <h2 className="text-xl font-bold text-yellow-300 mb-2 olympus-font">{hadesReward.name}</h2>
                                    {hadesReward.value > 0 && <p className="text-green-400 font-bold text-lg">+{hadesReward.value}⭐️</p>}
                                    <button onClick={exitHadesGame} className="w-full bg-gray-600 py-3 rounded-xl font-bold text-sm mobile-btn mt-4">Покинуть игру</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (currentGame?.type === 'flower_bank') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-pink-900 via-rose-900 to-pink-800 pb-4" style={{ backgroundImage: "url('roza.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                        <div className="max-w-lg mx-auto p-3">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-xl font-bold text-pink-300">💐 Банк цветов 💐</h1>
                                <button onClick={() => setCurrentGame(null)} className="bg-pink-600/40 hover:bg-pink-600 border border-pink-500/50 px-3 py-1.5 rounded-xl font-bold text-sm">✕ Выйти</button>
                            </div>

                            <div className="text-center mb-4">
                                <span className="bg-pink-500/30 text-pink-300 px-3 py-1 rounded-full text-xs font-bold">Временное событие!</span>
                            </div>

                            {!flowersUnlocked ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="text-4xl mb-2">🔒</div>
                                    <p className="text-pink-300 font-bold mb-2">Открытие 8.03.2026 12:30 МСК</p>
                                    <p className="text-gray-300 text-sm">Осталось: {flowersTimeLeft}</p>
                                </div>
                            ) : flowerBankReward ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="text-6xl mb-3">{flowerBankReward.emoji}</div>
                                    <h2 className="text-xl font-bold text-pink-300 mb-2">{flowerBankReward.name}</h2>
                                    <p className="text-gray-300 text-sm mb-4">Награда добавлена в инвентарь!</p>
                                    <button onClick={() => { setFlowerBankReward(null); setFlowerBankPlanted(false); setFlowerBankReady(false); }} className="w-full bg-pink-600 py-3 rounded-xl font-bold text-sm mobile-btn">Посадить ещё</button>
                                </div>
                            ) : flowerBankReady ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="text-5xl mb-3">🌸</div>
                                    <h2 className="text-xl font-bold text-green-400 mb-2">Цветок созрел!</h2>
                                    <button onClick={collectFlowerReward} className="w-full bg-gradient-to-r from-green-600 to-emerald-600 py-3 rounded-xl font-bold text-sm mobile-btn">Собрать награду</button>
                                </div>
                            ) : flowerBankPlanted ? (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="flower-bubble planted mb-4">🌱</div>
                                    <h2 className="text-xl font-bold text-pink-300 mb-2">Растет...</h2>
                                    <div className="flower-countdown">{flowerBankTimeLeft}</div>
                                    <p className="text-gray-400 text-sm">До созревания</p>
                                </div>
                            ) : (
                                <div className="glass rounded-xl p-4 text-center border border-pink-500/30">
                                    <div className="flower-bubble mb-4">🌺</div>
                                    <h2 className="text-xl font-bold text-pink-300 mb-2">Посади цветок!</h2>
                                    <p className="text-gray-300 text-sm mb-4">Через 6 часов собери награду</p>
                                    <button onClick={plantFlower} className="w-full bg-gradient-to-r from-pink-600 to-rose-600 py-3 rounded-xl font-bold text-sm mobile-btn">Посадить цветок💮</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (isAdmin) {
                const filteredUsers = allUsers.filter(u => {
                    if (!adminUserSearch) return true;
                    const searchLower = adminUserSearch.toLowerCase();
                    const nameMatch = u.name && u.name.toLowerCase().includes(searchLower);
                    const usernameMatch = u.username && u.username.toLowerCase().includes(searchLower);
                    const idMatch = u.id && u.id.includes(adminUserSearch);
                    return nameMatch || usernameMatch || idMatch;
                });
                
                return (
                    <div className="min-h-screen bg-gray-900 p-4">
                        <div className="max-w-lg mx-auto">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-xl font-bold">🔐 Админ</h1>
                                <button onClick={() => setIsAdmin(false)} className="text-gray-400">Выйти</button>
                            </div>
                            <div className="flex gap-2 mb-4 overflow-x-auto">
                                {['stats', 'users', 'rewards', 'settings'].map(tab => <button key={tab} onClick={() => setAdminScreen(tab)} className={`px-3 py-2 rounded-lg text-sm ${adminScreen === tab ? 'bg-indigo-600' : 'bg-gray-700'}`}>{tab === 'stats' ? '📊' : tab === 'users' ? '👥' : tab === 'rewards' ? '🎀' : '⚙️'} {tab}</button>)}
                            </div>
                            <div className="glass rounded-xl p-4">
                                {adminScreen === 'stats' && (
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-gray-800 p-3 rounded-lg"><div className="text-gray-400 text-xs">Игроков</div><div className="text-2xl font-bold">{allUsers.length}</div></div>
                                        <div className="bg-gray-800 p-3 rounded-lg"><div className="text-gray-400 text-xs">Общий баланс</div><div className="text-xl font-bold">{allUsers.reduce((s, u) => s + (u.balance || 0), 0).toFixed(0)}⭐️</div></div>
                                    </div>
                                )}
                                {adminScreen === 'users' && !selectedUser && (
                                    <div>
                                        <input type="text" placeholder="🔍 Поиск по имени, нику или ID..." value={adminUserSearch} onChange={e => setAdminUserSearch(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm mb-3" />
                                        <div className="space-y-2 max-h-80 overflow-y-auto">
                                            {filteredUsers.map(u => <div key={u.id} onClick={() => setSelectedUser(u)} className="bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 flex justify-between"><div><div className="font-bold text-sm">{u.name}</div><div className="text-xs text-gray-400">{u.username || u.id.slice(0, 12)}</div></div><div className="text-yellow-400 text-sm">{(u.balance || 0).toFixed(0)}⭐️</div></div>)}
                                        </div>
                                    </div>
                                )}
                                {adminScreen === 'users' && selectedUser && (
                                    <div>
                                        <h3 className="font-bold mb-3">👤 {selectedUser.name}</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-3">
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'stars', amount: 100 })} className="bg-green-600 p-2 rounded text-xs">+100⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'stars', amount: 500 })} className="bg-green-600 p-2 rounded text-xs">+500⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'stars', amount: 1000 })} className="bg-green-600 p-2 rounded text-xs">+1000⭐️</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'case', caseType: 'diamond', count: 5 })} className="bg-blue-600 p-2 rounded text-xs">+5💎</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'case', caseType: 'elite', count: 2 })} className="bg-red-600 p-2 rounded text-xs">+2🎖</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'unlock_collector' })} className="bg-pink-600 p-2 rounded text-xs">🔓Коллекц.</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'reset_daily' })} className="bg-cyan-600 p-2 rounded text-xs">🗓️Сброс</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'item', item: { id: 'random_case_box', name: 'Случайный кейс', emoji: '📦', type: 'random_case_box' } })} className="bg-amber-600 p-2 rounded text-xs">📦Ящик</button>
                                            <button onClick={() => adminGiveReward(selectedUser.id, { type: 'fate_ticket', count: 5 })} className="bg-red-700 p-2 rounded text-xs">+5🎟</button>
                                        </div>
                                        <button onClick={() => setSelectedUser(null)} className="w-full bg-gray-600 p-2 rounded text-sm">← Назад</button>
                                    </div>
                                )}
                                {adminScreen === 'rewards' && (
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => adminGiveReward(user.id, { type: 'stars', amount: 10000 })} className="bg-indigo-600 p-3 rounded text-sm">+10000⭐️</button>
                                        <button onClick={() => adminGiveReward(user.id, { type: 'case', caseType: 'diamond', count: 10 })} className="bg-blue-600 p-3 rounded text-sm">+10💎</button>
                                        <button onClick={() => adminGiveReward(user.id, { type: 'unlock_collector' })} className="bg-pink-600 p-3 rounded text-sm">🔓Коллекц.</button>
                                        <button onClick={() => adminGiveReward(user.id, { type: 'reset_daily' })} className="bg-cyan-600 p-3 rounded text-sm">🗓️Сброс</button>
                                    </div>
                                )}
                                {adminScreen === 'settings' && (
                                    <button onClick={async () => { if (confirm('Удалить ВСЕ данные?')) { await db.ref('users/' + user.id).remove(); localStorage.removeItem('sbs_user_id'); window.location.reload(); } }} className="bg-red-600 px-4 py-2 rounded-lg text-sm">🗑 Сбросить аккаунт</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24">
                    <header className="p-3 flex justify-between items-center glass sticky top-0 z-50">
                        <h1 onClick={handleTitleClick} className="text-lg font-bold cursor-pointer select-none hover:text-cyan-300 transition">Step By Step Game</h1>
                        <div className="flex gap-2">
                            <div className="ticket-badge px-3 py-2 rounded-full font-bold text-white shadow-lg text-sm flex items-center gap-1">
                                <span>🎟</span>
                                <span>{fateTickets}</span>
                            </div>
                            <button onClick={() => setShowTopUp(true)} className="bg-gradient-to-r from-yellow-400 to-orange-500 px-3 py-2 rounded-full font-bold text-gray-900 shadow-lg text-sm">{balance.toFixed(2)} ⭐️</button>
                        </div>
                    </header>

                    {paymentStatus && <div className="mx-3 mt-2 p-2 rounded-lg text-center text-xs bg-blue-500/20 border border-blue-500">{paymentStatus}</div>}

                    {showCollectibleModal && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full text-center">
                                <div className="text-6xl mb-3">{selectedCollectible?.emoji}</div>
                                <h3 className="text-xl font-bold mb-3">Коллекционный предмет!</h3>
                                <p className="mb-4 text-sm">Обратитесь к <a href="https://t.me/stepbystepdelision" target="_blank" className="text-blue-400 underline">администрации</a></p>
                                <button onClick={() => setShowCollectibleModal(false)} className="w-full bg-indigo-600 py-3 rounded-xl font-bold mobile-btn">Понятно</button>
                            </div>
                        </div>
                    )}

                    {showRandomCaseModal && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full text-center">
                                <div className="text-6xl mb-3 animate-bounce">📦</div>
                                <h3 className="text-xl font-bold mb-3">Случайный Кейс</h3>
                                <button onClick={exchangeRandomCaseBox} className="w-full bg-green-600 py-3 rounded-xl font-bold mb-2 mobile-btn">Обменять</button>
                                <button onClick={() => setShowRandomCaseModal(false)} className="w-full bg-gray-600 py-2 rounded-xl text-sm">Отмена</button>
                            </div>
                        </div>
                    )}

                    {showAdminLogin && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full">
                                <h2 className="text-xl font-bold text-center mb-4">🔐 Админ-панель</h2>
                                <input type="text" placeholder="Логин" value={adminLogin} onChange={e => setAdminLogin(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-3 mb-3 text-center text-sm" />
                                <input type="password" placeholder="Пароль" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-3 mb-4 text-center text-sm" />
                                <button onClick={checkAdminLogin} className="w-full bg-indigo-600 py-3 rounded-xl font-bold mb-2 mobile-btn">Войти</button>
                                <button onClick={() => setShowAdminLogin(false)} className="w-full bg-gray-700 py-2 rounded-xl text-sm">Отмена</button>
                            </div>
                        </div>
                    )}

                    {showWithdrawModal && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                            <div className="glass rounded-2xl p-5 max-w-sm w-full text-center">
                                <h2 className="text-xl font-bold mb-4">📊 Вывод призов</h2>
                                {!tasks.depositMajor?.completed ? (
                                    <div>
                                        <div className="text-4xl mb-3">🔒</div>
                                        <p className="text-sm mb-4 text-green-400 font-bold">Выполни задание: пополни на 350, чтобы выводить звезды в особом курсе, установленном администрацией!</p>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="text-4xl mb-3 text-green-400 animate-pulse">✅</div>
                                        <p className="text-sm mb-4">Обратитесь к администрации проекта!</p>
                                    </div>
                                )}
                                <button onClick={() => setShowWithdrawModal(false)} className="w-full bg-gray-600 py-2 rounded-xl text-sm">Закрыть</button>
                            </div>
                        </div>
                    )}

                    <main className="p-3 max-w-md mx-auto">
                        {currentScreen === 'cases' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 text-center">🎰 Кейсы</h2>
                                {Object.values(cases).filter(c => c.freeCount > 0 && c.id !== 'daily').map(c => (
                                    <div key={c.id + '_free'} className="bg-green-500/20 border border-green-500 rounded-lg p-2 mb-2 text-center text-sm animate-pulse">🎁 Бесплатных кейсов {c.name}: {c.freeCount}</div>
                                ))}

                                <div className="mb-5">
                                    <h3 className="text-lg font-bold text-center mb-3 text-purple-300 special-header">🔮 Особые 🔮</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.values(cases).filter(c => c.type === 'special').map(c => {
                                            const isDaily = c.id === 'daily';
                                            const isDailyWait = isDaily && c.freeCount === 0;
                                            const isFlowers = c.id === 'flowers';
                                            
                                            if (c.id === 'collector' && c.locked) {
                                                return (
                                                    <div key={c.id} className="rounded-xl p-3 relative case-collector opacity-80 overflow-hidden">
                                                        <div className="absolute inset-0 bg-black/50 z-20 flex items-center justify-center"><span className="text-4xl">🔒</span></div>
                                                        <div className="w-14 h-14 mx-auto rounded-lg bg-white/20 flex items-center justify-center text-2xl mb-2">{c.emoji}</div>
                                                        <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                        <p className="text-center text-xs opacity-75 mb-2">{c.price}⭐️</p>
                                                        <button disabled className="w-full py-2 rounded-lg font-bold text-xs bg-gray-800/80 cursor-not-allowed mobile-btn">Недоступно</button>
                                                    </div>
                                                );
                                            }
                                            
                                            if (isFlowers && c.locked) {
                                                return (
                                                    <div key={c.id} className="rounded-xl p-3 relative case-flowers opacity-80 overflow-hidden">
                                                        <div className="absolute inset-0 bg-black/50 z-20 flex flex-col items-center justify-center">
                                                            <span className="text-2xl mb-1">🔒</span>
                                                            <span className="text-xs text-center px-1">{flowersTimeLeft}</span>
                                                        </div>
                                                        <div className="w-14 h-14 mx-auto rounded-lg bg-white/20 flex items-center justify-center text-2xl mb-2">{c.emoji}</div>
                                                        <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                        <p className="text-center text-xs opacity-75 mb-2">
                                                            <span className="line-through">{c.price}⭐️</span> {c.discountPrice}⭐️
                                                        </p>
                                                        <button disabled className="w-full py-2 rounded-lg font-bold text-xs bg-gray-800/80 cursor-not-allowed mobile-btn">Скоро</button>
                                                    </div>
                                                );
                                            }
                                            
                                            return (
                                                <div key={c.id} className={`glass rounded-xl p-3 relative overflow-hidden hover:scale-105 transition ${c.id === 'collector' ? 'case-collector' : c.id === 'flowers' ? 'case-flowers' : ''}`}>
                                                    {isFlowers && <span className="absolute -top-1 -right-1 bg-pink-500 text-xs px-1.5 py-0.5 rounded-full animate-pulse">-25%</span>}
                                                    <div className={`w-14 h-14 mx-auto rounded-lg ${c.id === 'collector' || c.id === 'flowers' ? 'bg-white/20' : `bg-gradient-to-br ${c.color}`} flex items-center justify-center text-2xl mb-2`}>{c.emoji}</div>
                                                    <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                    <p className="text-center text-xs opacity-75 mb-2">
                                                        {isDaily ? (c.freeCount > 0 ? <span className="text-green-400 font-bold">Бесплатно!</span> : <span className="daily-timer">{dailyCaseTimeLeft}</span>) : 
                                                         isFlowers ? <span><span className="line-through">{c.price}⭐️</span> <span className="text-pink-400 font-bold">{c.discountPrice}⭐️</span></span> :
                                                         (c.price > 0 ? c.price + '⭐️' : '')}
                                                    </p>
                                                    <button onClick={() => handleSelectCase(c)} disabled={c.locked} className="w-full py-2 rounded-lg font-bold text-xs bg-gradient-to-r from-indigo-500 to-purple-500 transition mobile-btn">
                                                        {c.locked ? '🔒' : (isDailyWait ? '👁 Смотреть' : 'Открыть')}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="mb-5">
                                    <h3 className="text-lg font-bold text-center mb-3 text-yellow-300 ordinary-header">🎁 Обычные 🎁</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.values(cases).filter(c => !c.type && !c.locked).map(c => (
                                            <div key={c.id} className={`glass rounded-xl p-3 relative overflow-hidden hover:scale-105 transition ${c.id === 'cardboard' ? 'case-cardboard' : ''}`}>
                                                {c.isNew && <span className="absolute -top-1 -right-1 bg-red-500 text-xs px-1.5 py-0.5 rounded-full animate-pulse">New!</span>}
                                                <div className={`w-14 h-14 mx-auto rounded-lg ${c.id === 'cardboard' ? 'bg-white/20' : `bg-gradient-to-br ${c.color}`} flex items-center justify-center text-2xl mb-2`}>{c.emoji}</div>
                                                <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                <p className="text-center text-xs opacity-75 mb-2">
                                                    {c.freeCount > 0 ? <span className="text-green-400 font-bold">Бесплатно!</span> :
                                                        (c.discountPrice && c.discountPrice !== c.price ? <span><span className="line-through">{c.price}⭐️</span> {c.discountPrice}⭐️</span> : c.price + '⭐️')}
                                                </p>
                                                <button onClick={() => handleSelectCase(c)} className="w-full py-2 rounded-lg font-bold text-xs bg-gradient-to-r from-indigo-500 to-purple-500 transition mobile-btn">Открыть</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {Object.values(cases).filter(c => c.locked && !c.type).length > 0 && (
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.values(cases).filter(c => c.locked && !c.type                                        ).map(c => (
                                            <div key={c.id} className="glass rounded-xl p-3 relative opacity-50">
                                                <div className="absolute inset-0 bg-black/70 rounded-xl flex items-center justify-center"><span className="text-2xl">🔒</span></div>
                                                <div className={`w-14 h-14 mx-auto rounded-lg bg-gradient-to-br ${c.color} flex items-center justify-center text-2xl mb-2`}>{c.emoji}</div>
                                                <h3 className="font-bold text-center text-sm">{c.name}</h3>
                                                <p className="text-center text-xs mb-2">{c.price}⭐️</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentScreen === 'games' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 text-center">🎮 Игры</h2>
                                <div className="glass rounded-xl p-4 border border-yellow-500/30 mb-3" style={{ backgroundImage: "url('gerakl.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                                    <h3 className="text-xl font-bold mb-1 text-center text-yellow-300">🪬 13 Подвиг Геракла 🌊</h3>
                                    <p className="text-yellow-400 text-center text-xs mb-3">Пройди 10 раундов и получи сундук 📦</p>
                                    <button onClick={() => setCurrentGame({ type: 'gerakl' })} className="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn">Войти</button>
                                </div>
                                <div className="glass rounded-xl p-4 border border-red-500/30 mb-3" style={{ backgroundImage: "url('evil.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                                    <h3 className="text-xl font-bold mb-1 text-center text-red-300">🔥 Подземелье Аида 🔥</h3>
                                    <p className="text-red-400 text-center text-xs mb-3">Открой дверь судьбы 🎟</p>
                                    <button onClick={() => setCurrentGame({ type: 'hades' })} className="w-full bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold text-sm mobile-btn">Войти</button>
                                </div>
                                <div className="glass rounded-xl p-4 border border-pink-500/30" style={{ backgroundImage: "url('roza.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundBlendMode: 'overlay' }}>
                                    <h3 className="text-xl font-bold mb-1 text-center text-pink-300">💐 Банк цветов 💐</h3>
                                    <p className="text-pink-400 text-center text-xs mb-3">Временное событие! 🌸</p>
                                    <button onClick={() => setCurrentGame({ type: 'flower_bank' })} className="w-full bg-gradient-to-r from-pink-600 to-rose-600 py-3 rounded-xl font-bold text-sm mobile-btn">
                                        {!flowersUnlocked ? 'Скоро' : 'Войти'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {currentScreen === 'events' && (
                            <div className="min-h-[70vh] rounded-xl p-4 relative" style={{ backgroundImage: "url('olimp.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                <div className="absolute inset-0 bg-black/60 rounded-xl"></div>
                                <div className="relative z-10 flex items-center justify-center h-full min-h-[60vh]">
                                    <h2 className="soon-text olympus-font">Скоро...</h2>
                                </div>
                            </div>
                        )}

                        {currentScreen === 'tasks' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 text-center">📋 Задания</h2>
                                <div className="space-y-3">
                                    {[
                                        { id: 'subscribe', title: 'Подпишись на канал', reward: '1 кейс «Элита» 🎖', task: tasks.subscribe },
                                        { id: 'cardboard7', title: 'Прокрути кейс «Картон📦» 7 раз', reward: '1 кейс «Алмаз💎»', task: tasks.cardboard7, progress: `${tasks.cardboard7?.count || 0}/7` },
                                        { id: 'deposit50', title: 'Пополни баланс на 50⭐️', reward: '50⭐️', task: tasks.deposit50 },
                                        { id: 'inviteThree', title: 'Пригласить 3 друзей', reward: '25⭐️', task: tasks.inviteThree, progress: `${tasks.inviteThree?.count || 0}/3` },
                                        { id: 'deposit', title: 'Пополнить на 100⭐️', reward: '1 золотой кейс 👑', task: tasks.deposit },
                                        { id: 'depositMajor', title: 'Пополнить на 350⭐️', reward: 'Кейс «Коллекционер» + прокрут', task: tasks.depositMajor },
                                    ].map(t => (
                                        <div key={t.id} className={`glass rounded-xl p-3 ${t.task?.completed ? 'bg-green-500/20' : ''}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <h3 className="font-bold text-sm">{t.title}</h3>
                                                    <p className="text-xs opacity-75">Награда: {t.reward}</p>
                                                    {t.progress && !t.task?.completed && <p className="text-xs text-cyan-400 mt-0.5">Прогресс: {t.progress}</p>}
                                                </div>
                                                {t.task?.completed && <span className="text-green-400 text-xl">✅</span>}
                                            </div>
                                            {t.id !== 'cardboard7' && (
                                                <button onClick={() => completeTask(t.id)} disabled={t.task?.completed} className={`w-full py-2 rounded-lg text-sm mobile-btn ${t.task?.completed ? 'bg-green-600' : 'bg-blue-600'}`}>
                                                    {t.task?.completed ? 'Выполнено' : (t.id === 'subscribe' ? 'Подписаться' : t.id === 'inviteThree' ? 'Пригласить' : 'Пополнить')}
                                                </button>
                                            )}
                                            {t.id === 'cardboard7' && (
                                                <button disabled className={`w-full py-2 rounded-lg text-sm mobile-btn ${t.task?.completed ? 'bg-green-600' : 'bg-gray-600'}`}>
                                                    {t.task?.completed ? 'Выполнено ✅' : 'Открывайте кейс Картон'}
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentScreen === 'profile' && (
                            <div>
                                <div className="glass rounded-xl p-2.5 mb-3 flex justify-between items-center">
                                    <span className="text-gray-400 text-sm">🟢 Онлайн:</span>
                                    <span className="font-bold text-green-400 text-sm">{onlineCount}</span>
                                </div>
                                <h2 className="text-2xl font-bold mb-4 text-center">👤 Профиль</h2>
                                <div className="glass rounded-xl p-4 text-center mb-4">
                                    <div className="w-16 h-16 mx-auto rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-2xl mb-2 overflow-hidden border-2 border-white/20">
                                        {user?.avatar ? <img src={user.avatar} alt="" className="w-full h-full object-cover" /> : user?.name?.charAt(0).toUpperCase()}
                                    </div>
                                    <h3 className="text-lg font-bold">{user?.name}</h3>
                                    {user?.username && <p className="text-gray-400 text-sm">{user.username}</p>}
                                </div>
                                <div className="flex gap-2 mb-3">
                                    <button onClick={() => setShowTopUp(true)} className="flex-1 bg-gradient-to-r from-yellow-400 to-orange-500 text-gray-900 font-bold py-3 rounded-xl text-sm mobile-btn">💎 Пополнить</button>
                                </div>
                                <button onClick={() => setShowWithdrawModal(true)} className={`w-full font-bold py-3 rounded-xl text-sm mb-3 mobile-btn ${tasks.depositMajor?.completed ? 'bg-gradient-to-r from-green-500 to-emerald-600 animate-pulse' : 'bg-gradient-to-r from-gray-600 to-gray-700'}`}>
                                    {tasks.depositMajor?.completed ? '🏆 Вывести призы ✅' : '🔒 Вывести призы'}
                                </button>

                                <div className="glass rounded-xl p-3 mb-3">
                                    <h3 className="font-bold mb-2 text-sm">🎁 Промокод</h3>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="ПРОМОКОД" value={promoCode} onChange={e => setPromoCode(e.target.value)} className="flex-1 bg-gray-700/50 border border-gray-600 rounded-lg px-3 py-2 text-center uppercase text-sm" />
                                        <button onClick={checkPromo} className="bg-indigo-600 px-4 py-2 rounded-lg font-bold text-sm">OK</button>
                                    </div>
                                    {promoError && <p className="text-red-400 text-xs mt-2 text-center">{promoError}</p>}
                                    {promoSuccess && <p className="text-green-400 text-xs mt-2 text-center">{promoSuccess}</p>}
                                </div>

                                <div className="glass rounded-xl p-3">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-bold text-sm">🎒 Инвентарь</h3>
                                        <span className="text-xs text-gray-400">{inventory.length}/{inventorySlots}</span>
                                    </div>
                                    <div className="grid grid-cols-5 gap-2 mb-2">
                                        {[...Array(inventorySlots)].map((_, i) => (
                                            <div key={i} className="aspect-square bg-gray-700/50 rounded-lg flex items-center justify-center text-xl cursor-pointer hover:bg-gray-600/50 transition">
                                                {inventory[i] ? <span onClick={() => sellItem(inventory[i])} className="hover:scale-110 transition">{inventory[i].emoji}</span> : <span className="text-gray-600 text-xs">○</span>}
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={unlockSlot} disabled={balance < 50} className="w-full bg-gray-700 disabled:opacity-50 py-2 rounded-lg text-xs font-bold mobile-btn">🔓 Слот (50⭐️)</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {selectedCase && (
                        <div className="fullscreen-modal flex items-center justify-center p-3">
                            <div className="w-full max-w-lg" ref={rouletteContainerRef}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold">{selectedCase.emoji} {selectedCase.name}</h3>
                                    <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="text-3xl hover:text-red-400">×</button>
                                </div>
                                <div className="roulette-container mb-4">
                                    <div className="roulette-pointer" />
                                    <div key={rouletteKey} className="roulette-inner" style={{ transform: `translateX(${rouletteOffset}px)` }}>
                                        {fakeItems.length > 0 ? fakeItems.map((item, i) => (
                                            <div key={i} className="roulette-item"><div className="emoji">{item.emoji}</div><div className="name">{item.name}</div></div>
                                        )) : [...Array(80)].map((_, i) => <div key={i} className="roulette-item"><div className="emoji">❓</div></div>)}
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-3 mb-4 max-h-36 overflow-y-auto">
                                    <p className="font-bold mb-1 text-center text-sm">Возможные награды:</p>
                                    <div className="space-y-1">{CASE_REWARDS[selectedCase.id]?.map((r, i) => (
                                        <div key={i} className="flex justify-between py-0.5 border-b border-white/10 last:border-0 text-xs">
                                            <span>{r.emoji} {r.name}</span><span className="text-yellow-400 font-bold">{r.displayChance}</span>
                                        </div>
                                    ))}</div>
                                </div>
                                {spinResult ? (
                                    <div className="text-center">
                                        <p className="text-xl font-bold mb-2">🎉 {spinResult.name}!</p>
                                        <button onClick={() => { setSpinResult(null); openCase(selectedCase.id); }} className="w-full bg-green-600 py-3 rounded-xl font-bold mb-2 mobile-btn">Ещё раз</button>
                                        <button onClick={() => { setSelectedCase(null); setSpinResult(null); setFakeItems([]); }} className="w-full bg-gray-600 py-2.5 rounded-xl font-bold text-sm mobile-btn">К кейсам</button>
                                    </div>
                                ) : (
                                    <button onClick={() => openCase(selectedCase.id)} disabled={isSpinning || (selectedCase.id === 'daily' && selectedCase.freeCount === 0)} className="w-full bg-gradient-to-r from-indigo-500 to-purple-500 py-4 rounded-xl font-bold text-lg disabled:opacity-50 mobile-btn">
                                        {isSpinning ? '🌀 Крутим...' : (selectedCase.id === 'daily' && selectedCase.freeCount === 0 ? dailyCaseTimeLeft : `Открыть за ${getCasePrice(selectedCase.id) === 0 ? 'Бесплатно' : getCasePrice(selectedCase.id) + '⭐️'}`)}
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {showTopUp && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-3">
                            <div className="glass rounded-2xl p-4 max-w-sm w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-lg font-bold">💳 Пополнение</h3>
                                    <button onClick={() => setShowTopUp(false)} className="text-2xl hover:text-red-400">×</button>
                                </div>
                                
                                {paymentStatus && (
                                    <div className="mb-3 p-2 bg-blue-500/20 border border-blue-500 rounded-lg text-center text-xs">
                                        {paymentStatus}
                                    </div>
                                )}
                                
                                <p className="text-xs text-red-400 text-center mb-2 font-bold">🎟 БИЛЕТ СУДЬБЫ (Подземелье Аида)</p>
                                <button onClick={buyFateTicket} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-red-500/50 mb-4">
                                    <span className="font-bold text-red-400 text-sm">+1 🎟 Билет судьбы</span>
                                    <span className="text-yellow-400 font-bold text-sm">5 ⭐️</span>
                                </button>

                                <p className="text-xs text-gray-400 text-center mb-2">⭐️ Telegram Stars</p>
                                <div className="space-y-2 mb-3">
                                    {STARS_PACKAGES.map(pkg => (
                                        <button key={pkg.stars} onClick={() => buyStars(pkg)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-white/10">
                                            <span className="font-bold text-yellow-400 text-sm">+{pkg.stars} ⭐️</span>
                                            <span className="text-gray-300 text-xs">Купить</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="border-t border-gray-600 pt-3">
                                    <p className="text-xs text-gray-400 text-center mb-2">💎 TON</p>
                                    {TON_RATES.map(rate => (
                                        <button key={rate.stars} onClick={() => topUpBalance(rate.stars, rate.ton)} className="w-full glass p-3 rounded-xl flex justify-between items-center hover:bg-white/10 border border-white/10 mb-2">
                                            <span className="font-bold text-sm">+{rate.stars}⭐️</span>
                                            <span className="text-yellow-400 font-bold text-sm">{rate.ton} TON</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-1.5 z-40">
                        <div className="max-w-md mx-auto flex justify-around">
                            {[
                                { id: 'tasks', emoji: '📋', label: 'Задания' },
                                { id: 'cases', emoji: '🎁', label: 'Кейсы' },
                                { id: 'events', emoji: '🏛️', label: 'Ивенты' },
                                { id: 'games', emoji: '🎮', label: 'Игры' },
                                { id: 'profile', emoji: '👤', label: 'Профиль' }
                            ].map(s => (
                                <button key={s.id} onClick={() => setCurrentScreen(s.id)} className={`flex flex-col items-center p-1.5 rounded-lg transition ${currentScreen === s.id ? 'events-tab-active text-yellow-400 scale-110' : 'text-gray-400 hover:text-white'}`}>
                                    <span className="text-xl">{s.emoji}</span>
                                    <span className="text-[10px] font-bold">{s.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
